<html>
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirë se vini | Gjuha në Lojë</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2196F3, #21CBF3);
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }

        header {
            background: white;
            padding: 30px 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        header h1 {
			font-size: 30px;
            color: #2196F3;
            margin-bottom: 10px;
        }

        header p {
            font-size: 15px;
            margin: 0;
        }

        .menu {
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }

        .menu a {
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            text-decoration: none;
            color: black;
            font-weight: bold;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .menu a:hover {
            transform: scale(1.08);
        }

        .entry-card {
            background: white;
            width: 360px;
            margin: 20px auto 0;
            margin-bottom: 0px;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
            text-align: center;
            animation: fadeIn 1s ease;
        }

		.students{
		margin-top: 0px;
		margin-bottom: 20px;
		}
		
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .entry-button {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #2196F3, #1e88e5);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            box-sizing: border-box;
        }

        .entry-button:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #1e88e5, #1565c0);
        }

        .entry-button:active {
            transform: scale(0.98);
        }

        .entry-button.secondary {
            width: auto;
            padding: 8px 14px;
            font-size: 14px;
            background: transparent;
            color: #1565c0;
            border: 1px solid #90caf9;
            border-radius: 999px;
            box-shadow: none;
            margin-top: 6px;
        }

        .entry-button.secondary:hover {
            transform: none;
            background: #e3f2fd;
        }

        .button-grid {
            display: grid;
            gap: 10px;
        }

        .top-link {
            display: inline-block;
            margin: 20px 0 0;
            font-size: 14px;
            color: #ffffff;
            text-decoration: none;
            opacity: 0.9;
        }

        .top-link:hover {
            opacity: 1;
            text-decoration: underline;
        }

        footer {
            background: #333;
            color: white;
            padding: 20px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>
	
<header>

	<img src="assets/logo e shkolles.jpg" alt="Logo" height="250" width="250"/>
	<p>Shkolla 9-vjeçare "Kushtrimi i lirisë" Durrës</p>
    
	<h1>Mëso duke u zbavitur!</h1>
    <p>Një platformë digjitale për zhvillimin e kompetencave gjuhësore përmes lojës</p>
</header>

<div class="entry-card">
    <div class="button-grid">
        <a class="entry-button" href="pages/klasa-e-gjashte.html">
            Klasa e gjashtë
        </a>
        <a class="entry-button" href="pages/klasa-e-shtate.html">
            Klasa e shtatë
        </a>
        <a class="entry-button" href="pages/klasa-e-tete.html">
            Klasa e tetë
        </a>
        <a class="entry-button" href="pages/klasa-e-nente.html">
            Klasa e nëntë
        </a>
        <a class="entry-button secondary" href="pages/lojera-gjuhesore.html">
            Lojëra gjuhësore
        </a>
    </div>
</div>

	<div class="students">
<img src="assets/student.png" alt="Student" height="300px" width="300px"/>
	</div>
		
<footer>

</footer>
