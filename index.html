<html>
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirë se vini | Gjuha në Lojë</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2196F3, #21CBF3);
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }

        header {
            background: white;
            padding: 30px 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        header h1 {
			font-size: 30px;
            color: #2196F3;
            margin-bottom: 10px;
        }

        header p {
            font-size: 15px;
            margin: 0;
        }

        .menu {
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }

        .menu a {
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            text-decoration: none;
            color: black;
            font-weight: bold;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .menu a:hover {
            transform: scale(1.08);
        }

        form {
            background: white;
            width: 320px;
            margin: 40px auto;
			margin-bottom:0px;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
            text-align: left;
            animation: fadeIn 1s ease;
        }

		.students{
		margin-top: 0px;
		margin-bottom: 20px;
		}
		
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        form label {
            font-weight: bold;
        }

        form input {
            width: 100%;
            padding: 8px;
            margin: 8px 0 15px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        form input:focus {
            outline: none;
            border-color: #2196F3;
            box-shadow: 0 0 5px rgba(33,150,243,0.5);
        }

        form button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #2196F3, #1e88e5);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        form button:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #1e88e5, #1565c0);
        }

        form button:active {
            transform: scale(0.98);
        }

        #welcomeMsg {
            margin-top: 15px;
            font-weight: bold;
            color: #2196F3;
            text-align: center;
        }

        footer {
            background: #333;
            color: white;
            padding: 20px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>
	
<header>

	<img src="assets/logoja e shkolles.png" alt="Logo" height="30" width="30"/>
	<p>Shkolla 9-vjeçare "Kushtrimi i lirisë" Durrës</p>
    
	<h1>Mëso gjuhën shqipe duke u zbavitur!</h1>
    <p>Një platformë digjitale për zhvillimin e kompetencave gjuhësore përmes lojës.</p>
</header>

<div class="menu">
    <a href="pages/Udhëzues loje.pdf" target="_blank">📘 Shikoni udhëzuesin</a>
</div>

<form id="myForm">
    <label for="fname">Emri:</label>
    <input type="text" id="fname" required>

    <label for="lname">Mbiemri:</label>
    <input type="text" id="lname" required>

    <label for="email">Email:</label>
    <input type="email" id="email" required>

    <button type="button" onclick="checkForm()">Hyni në lojë</button>

    <p id="welcomeMsg"></p>
</form>


	<div class="students">
<img src="assets/student.png" alt="Student" height="300px" width="300px"/>
	</div>
		
<footer>
	&copy Gjuha në lojë - 2026
</footer>

<script>
function checkForm() {
    const form = document.getElementById("myForm");
    const fname = document.getElementById("fname").value;
    const msg = document.getElementById("welcomeMsg");

    if (form.checkValidity()) {
        msg.textContent = "Mirë se erdhe, " + fname + "! Po ju dërgojmë në faqen kryesore...";

        setTimeout(() => {
            window.location.href = "Konkursi Website.html";
        }, 1500);
    } else {
        form.reportValidity();
    }
}
</script>

</body>
</html>
