<html>
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lojë Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
			background: white;
        }
		
        .quiz-container {
            background: #21CBF3;
            padding: 20px;
            width: 600px;
            border-radius: 30px;
            text-align: center;
        }
		
        button {
            display: block;
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
			background: white;
			border-radius: 15px;
        }

        .correct {
            background-color: #4CAF50;
            color: white;
        }

        .wrong {
            background-color: #f44336;
            color: white;
        }

        #nextBtn {
            display: none;
            background: white;
            color: black;
        }
		
		a{
		color:black;
		}
		
        #timer {
            font-weight: bold;
            margin-bottom: 10px;
        }

		.menu button{
		 box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }
		
		.menu button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2 id="question">Pyetja</h2>
    <div id="timer">Koha: 40</div>
    <div id="answers"></div>
    <div class="menu">
    <button id="nextBtn" onclick="nextQuestion()">Pyetja tjetër</button>
	</div>
</div>

<script>
    const quiz = [
        {
            question: "1. Fjala e futur gabim sipas formimit është:",
            answers: ["A) ditë;", "B) ushqim;", "C) ditar;", "D) mësoj."],
            correct: 0
        },
        {
            question: "2. Është në formën joveprore, mënyra dëshirore, folja në fjalinë:",
            answers: ["A) Njeriu u mësuakësh dhe me këto kushte.", "B) Ai qenkësh emëruar diku tjetër këto kohë.", "C) U rritsh e u bëfsh sa malet!", "D) Do të ndihesha më mirë, po të kishe ardhur dhe ti."],
            correct: 2
        },
        {
            question: "3. Përemri që është futur gabim sipas llojit është:",
            answers: ["A) shkëlqimin e vet;", "B) peshën e saj;", "C) të ftohtët e tyre;", "D) kangjella të tjera."],
            correct: 3
        },
        {
            question: "4. Në cilin rast, fjala në thonjëza është ndajfolje?",
            answers: ["A) E kaloi dorën ''pas'' qafe.", "B) Përkujdesej nga ''afër'' për shëndetin tim.", "C) Bashkohej ''përmes'' një porte të dyfishtë.", "D) Ajo u ul ''buzë'' krevatit."],
            correct: 1
        },
        {
            question: "5. Gjeni fjalën e shkruar gabim:",
            answers: ["A) rracë;", "B) rregull;", "C) ëndrra;", "D) radhë."],
            correct: 0
        },
        {
            question: "6. Cila nga alternativat ka kallëzues foljor të përbërë?",
            answers: ["A) Cila është gjëja më e rëndëshishme në jetë?", "B) Babai ka punuar tërë jetën me ndershmëri.", "C) Shtëpia qe plot dritë.", "D) Ai nisi të këndonte shumë bukur."],
            correct: 3
        },
		{
            question: "7. Gjeni ndajshtimin në alternativat e dhëna.",
            answers: ["A) Ti i the nënës se të solli yt vëlla?", "B) Ajo është me origjinë shqiptare.", "C) Mësuese Mira vjen të hënën në mësim.", "D) Unë e dua këtë qytet."],
            correct: 2
        },
		{
            question: "8. Dalloni kundrinorin e drejtë:",
            answers: ["A) U çoi bukë miqve.", "B) Nxënësit e lavdëruan të gjithë.", "C) Të foli nëna?", "D) Më erdhi keq për gjyshen."],
            correct: 1
        },
		{
            question: "9. Në cilën alternativë është përdorur fjalia me pjesë të nënrenditur ftilluese?",
            answers: ["A) E mira do të ishte që ju të punoni çdo ditë për këtë projekt.", "B) Në vesh kam shprehjet që ai i përdorte gjithmonë.", "C) Ishte përqafimi i tim eti, që më bënte të lumtur.", "D) Kur fillova të lexoja, të gjithë heshtën."],
            correct: 0
        },
		{
            question: "10. Ata lanë punën, kur dielli kishte perënduar. Pjesa e nënrenditur është:",
            answers: ["A) vendore;", "B) qëllimore;", "C) kohore;", "D) përcaktore."],
            correct: 2
        }
    ];

    let currentQuestion = 0;
    let score = 0;
    let timeLeft = 40;
    let timer;

    function loadQuestion() {
        clearInterval(timer);
        timeLeft = 40;
        document.getElementById("timer").innerText = "Koha: " + timeLeft;

        timer = setInterval(() => {
            timeLeft--;
            document.getElementById("timer").innerText = "Koha: " + timeLeft;
            if (timeLeft === 0) {
                clearInterval(timer);
                disableButtons();
                document.getElementById("nextBtn").style.display = "block";
            }
        }, 1000);

        const q = quiz[currentQuestion];
        document.getElementById("question").innerText = q.question;

        const answersDiv = document.getElementById("answers");
        answersDiv.innerHTML = "";

        q.answers.forEach((answer, index) => {
            const btn = document.createElement("button");
            btn.innerText = answer;
            btn.onclick = () => checkAnswer(index, btn);
            answersDiv.appendChild(btn);
        });

        document.getElementById("nextBtn").style.display = "none";
    }

    function checkAnswer(index, button) {
        clearInterval(timer);
        const correctIndex = quiz[currentQuestion].correct;

        if (index === correctIndex) {
            button.classList.add("correct");
            score++;
        } else {
            button.classList.add("wrong");
        }

        disableButtons();
        document.getElementById("nextBtn").style.display = "block";
    }

    function disableButtons() {
        const buttons = document.querySelectorAll("#answers button");
        buttons.forEach(btn => btn.disabled = true);
    }

    function nextQuestion() {
    currentQuestion++;

    if (currentQuestion < quiz.length) {
        loadQuestion();
    } else {

        let content = `
            <h2>Quiz përfundoi 🎉</h2>
            <p>Ke marrë <strong>${score}</strong> pikë nga <strong>${quiz.length}</strong></p>
        `;

        if (score === 10) {
            content += `<p>Suksesi është fryt i dijes. Urime për arritjen maksimale! 🏆</p>`;
		} else if (score === 9) {
			content += `<p>Rezultat shumë i mirë! Jeni një hap larg rezultatit maksimal. Vazhdoni të punoni me përkushtim! 👏🔥 </p>`;
		} else if (score === 8) {
			content += `<p>Rezultat shumë i mirë! Jeni një hap larg rezultatit maksimal. Vazhdoni të punoni me përkushtim! 👏🔥 </p>`;
		} else if (score === 7) {
			content += `<p>Rezultat i mirë! Suksesi ndërtohet hap pas hapi. 🌟📈</p>`;
		} else if (score === 6) {
			content += `<p>Rezultat i mirë! Suksesi ndërtohet hap pas hapi. 🌟📈</p>`;
		} else if (score === 5) {
			content += `<p>Rezultat i mirë! Suksesi ndërtohet hap pas hapi. 🌟📈</p>`;
		} else if (score === 4) {
			content += `<p>Çdo sfidë është një mundësi për të mësuar. Provojeni sërish dhe do të shihni përmirësim! 😊</p>`;
		} else if (score === 3) {
			content += `<p>Çdo sfidë është një mundësi për të mësuar. Provojeni sërish dhe do të shihni përmirësim! 😊</p>`;
		} else if (score === 2) {
			content += `<p>Çdo sfidë është një mundësi për të mësuar. Provojeni sërish dhe do të shihni përmirësim! 😊</p>`;
		} else if (score === 1) {
			content += `<p>Çdo sfidë është një mundësi për të mësuar. Provojeni sërish dhe do të shihni përmirësim! 😊</p>`;
        } else if (score === 0) {
            content += `<p>Çdo sfidë është një mundësi për të mësuar. Provojeni sërish dhe do të shihni përmirësim! 😊</p>`;
        }

        content += `
            <button onclick="window.location.href='../index.html'">
                Kthehu në faqen kryesore
            </button>
        `;

        document.querySelector(".quiz-container").innerHTML = content;
    }
}

    loadQuestion();

</script>

</body>

</html>
