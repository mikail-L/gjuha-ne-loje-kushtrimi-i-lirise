<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klasa e gjashtë</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e3f2fd, #f8fbff);
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
      width: 100%;
      max-width: 520px;
    }

    h1 {
      margin-top: 0;
      color: #1565c0;
    }

    .button-group {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    .button {
      display: block;
      padding: 12px 16px;
      background: linear-gradient(135deg, #2196f3, #1e88e5);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
      font-size: 16px;
      font-family: Arial, sans-serif;
      line-height: 1.4;
      border: none;
      cursor: pointer;
      transition: transform 0.2s ease;
      box-sizing: border-box;
    }

    .button:hover {
      transform: scale(1.02);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Klasa e gjashtë</h1>
    <div class="button-group">
      <a class="button" href="gramatike-klasa-e-gjashte.html">Përdorimi i drejtë i gjuhës</a>
      <a class="button" href="te-lexuarit-klasa-e-gjashte.html">Të lexuarit e teksteve të ndryshme</a>
    </div>
  </div>
</body>
</html>
