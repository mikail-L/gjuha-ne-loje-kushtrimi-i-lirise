    <h2 id="question">Pyetja</h2>

<script>
const quiz = [
{
    question: "1. Sipas formimit fjala e përbërë është:",
    answers: ["A) gjithmonë;", "B) mësuar;", "C) faqebardhë;", "D) të fuqishëm."],
    correct: 2
},
{
    question: "2. Te fjala 'punëtorët', -ë është:",
    answers: ["A) morfemë trajtëformuese (mbaresë);", "B) prapashtesë trajtëformuese;", "C) parashtesë;", "D) prapashtesë."],
    correct: 1
},
{
    question: "3. Në cilën alternativë kemi shprehje frazeologjike?",
    answers: ["A) Ata mezi i mbanin lotët.", "B) Gur-gur bëhet kalaja.", "C) Armikut dhe erës ktheji gjoksin.", "D) Nuk duhet t'ia krehim bishtin."],
    correct: 3
}
];

let currentQuestion = 0;
let score = 0;

function loadQuestion() {
    const questionEl = document.getElementById("question");
    const answersEl = document.getElementById("answers");
    const resultEl = document.getElementById("result");

    resultEl.textContent = "";
    answersEl.innerHTML = "";

    const current = quiz[currentQuestion];
    questionEl.textContent = current.question;

    current.answers.forEach((answer, index) => {
        const button = document.createElement("button");
        button.textContent = answer;
        button.onclick = () => checkAnswer(index);
        answersEl.appendChild(button);
    });
}

function checkAnswer(index) {
    if (index === quiz[currentQuestion].correct) {
        score++;
        document.getElementById("result").textContent = "✔ Përgjigje e saktë!";
    } else {
        document.getElementById("result").textContent = "✘ Përgjigje e gabuar!";
    }

    setTimeout(() => {
        currentQuestion++;
        if (currentQuestion < quiz.length) {
            loadQuestion();
        } else {
            document.getElementById("quiz-container").innerHTML =
                "<h2>Kuizi përfundoi!</h2><p>Rezultati: " + score + " / " + quiz.length + "</p>";
        }
    }, 1000);
}

loadQuestion();
	
    let currentQuestion = 0;

    function loadQuestion() {
        clearInterval(timer);

        document.getElementById("timer").innerText = "Koha: " + timeLeft;

        timer = setInterval(() => {
            timeLeft--;
            document.getElementById("timer").innerText = "Koha: " + timeLeft;
            if (timeLeft === 0) {
                clearInterval(timer);
                disableButtons();
                document.getElementById("nextBtn").style.display = "block";
            }
        }, 1000);

        answersDiv.innerHTML = "";

        q.answers.forEach((answer, index) => {
            const btn = document.createElement("button");
            btn.innerText = answer;
            btn.onclick = () => checkAnswer(index, btn);
            answersDiv.appendChild(btn);
        });

        document.getElementById("nextBtn").style.display = "none";
    }

    function checkAnswer(index, button) {
        clearInterval(timer);
        const correctIndex = quiz[currentQuestion].correct;

        if (index === correctIndex) {
            button.classList.add("correct");
            score++;
        } else {
            button.classList.add("wrong");
        }

        disableButtons();
        document.getElementById("nextBtn").style.display = "block";
    }

    function disableButtons() {
        const buttons = document.querySelectorAll("#answers button");
        buttons.forEach(btn => btn.disabled = true);
    }
