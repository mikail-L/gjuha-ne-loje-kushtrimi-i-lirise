<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lojë Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: white;
        }

        .quiz-container {
            background: #21CBF3;
            padding: 20px;
            width: 600px;
            border-radius: 30px;
            text-align: center;
        }

        button {
            display: block;
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            background: white;
            border-radius: 15px;
            border: none;
            transition: background 0.3s;
        }

        button.correct {
            background-color: #4CAF50;
            color: white;
        }

        #nextBtn {
            display: none;
            background: white;
            color: black;
        }

        #timer {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 20px;
            color: black;
        }

        #result {
            height: 24px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2 id="question">Pyetja</h2>
    <div id="timer">Koha: 40</div>
    <div id="answers"></div>
    <div id="result"></div>
    <button id="nextBtn" onclick="nextQuestion()">Pyetja tjetër</button>
</div>

<script>
const quiz = [
    {

    {

        correct: 1
    },
    {
        question: "3. Në cilën alternativë kemi shprehje frazeologjike?",
        answers: ["A) Ata mezi i mbanin lotët.", "B) Gur-gur bëhet kalaja.", "C) Armikut dhe erës ktheji gjoksin.", "D) Nuk duhet t'ia krehim bishtin."],
        correct: 3
    },
    {
        question: "4. Fjala e shkruar gabim është:",
        answers: ["A) kurrkund;", "B) kurrëkund;", "C) gjithsecili;", "D) gjithnjë."],
        correct: 1
    },
    {
        question: "5. Në cilën alternativë fjala ''rreth'' është parafjalë?",
        answers: ["A) Vizato një ''rreth'' dhe një katror.", "B) E priti ''rreth'' dy orë.", "C) Fëmijët ishin mbledhur ''rreth'' mësuesit.", "D) Vajza e vogël kishte vendosur një ''reth'' në kokë."],
        correct: 2
    },
    {
        question: "6. Korabi është mali më i lartë në vendin tonë. Fjala ''më'' është:",
        answers: ["A) trajtë e shkurtër e përemrit vetor;", "B) pasthirrmë;", "C) parafjalë;", "D) pjesëz."],
        correct: 3
    },
    {
        question: "7. Dalloni përemrin dëftor.",
        answers: ["A) Ai mëson shumë.", "B) Ai libër ishte shumë tërheqës.", "C) Ata këndonin shumë bukur.", "D) Ai është portier i skuadrës ''Teuta''. "],
        correct: 1
    },
    {
        question: "8. Moxarti i vogël tregoi aftësi shumë të rralla. Mbiemri ''të rralla'' është në shkallën:",

        correct: 1
    },
    {
        question: "9. Ai ndërtoi një shtëpi guri. Rasa e emrit ''guri'' është:",
        answers: ["A) emërore;", "B) dhanore;", "C) kallëzore;", "D) rrjedhore."],
        correct: 3
    },
    {
        question: "10. ''Për të mësuar'' është formë e pashtjelluar:",
        answers: ["A) mohore;", "B) paskajore;", "C) pjesore;", "D) përcjellore."],
        correct: 1
    },
    {
        question: "11. Dalloni foljen në mënyrën lidhore, forma joveprore.",
        answers: ["A) Vamë t'i flisnim s'u përgjigj.", "B) Sikur të ishte përgatitur më shumë!", "C) Në majën e lartë u ngrit një mjegull e bardhë.", "D) Të kishte zgjatur dhe tri orë më shumë kjo mbrëmje."],
        correct: 0
    },
    {
        question: "12. Te grupi i fjalëve ''duhet të mësonte'', folja duhet është:",
        answers: ["A) modale;", "B) me kuptim të plotë leksikor;", "C) gjysmëndihmëse që tregon fillim veprimi;", "D) ndihmëse."],
        correct: 0
    },
    {
        question: "13. Ky mendim nuk na pëlqeu. Në këtë fjali kryefjala është shprehur me:",
        answers: ["A) emër;", "B) përemër;", "C) grup emëror;", "D) numëror."],
        correct: 2
    },
    {
        question: "14. Dalloni kallëzuesin foljor të përbërë.",
        answers: ["A) Qielli është i vrenjtur.", "B) Nderi do shpërblyer me nder.", "C) Nuk është pa talent djali.", "D) Dielli kishte nisur të perëndonte."],
        correct: 1
    },
    {
        question: "15. Drita e hënës lodronte mbi valëzat ledhatare të liqenti. Fjala ''e hënës'' është:",
        answers: ["A) kundrinor;", "B) përcaktor me përshtatje;", "C) rrethanor;", "D) përcaktor me drejtim."],
        correct: 3

    {

        correct: 0
    },
    {
        question: "17. Kurrkush prej nesh nuk kishte guxim të prishte qetësinë. Kundrinori ''qetësinë'' është:",
        answers: ["A) kundrrinor i drejtë;", "B) kundrinor i zhdrejtë me parafjalë;", "C) kundrinor i zhdrejtë pa parafjalë."],
        correct: 0
    },
    {
        question: "18. Fjalia që përmban gjymtyrë homogjene është:",
        answers: ["A) Ajo po sheh fushat e zbehta dhe kodrat gjethezëna.", "B) Filmi ishte i bukur, por i gjatë.", "C) Koha u prish, por unë do të shkoj nesër.", "D) Gjelbërimi i drurëve të kopshtit dhe lulet kacavjerrëse kujtuan fëmijërinë."],
        correct: 1
    },
    {
        question: "19. Vjeshtë e verdhë me shi e me baltë. Fjalia sipas gjymtyrës kryesore është:",
        answers: ["A) njëkryegjymtyrëshe foljore me vetë të përcaktuar;", "B) njëkryegjymtyrëshe foljore me vetë të papërcaktuar;", "C) njëkryegjymtyrëshe emërore;", "D) dykryegjymtyrëshe."],
        correct: 2
    },
    {
        question: "20. Tani po ju lë në studimet tuaja profesor. Kjo fjali është:",
        answers: ["A) pavetore;", "B) vetore, me vetë të percaktuar;", "C) vetore, me vetë të papërcaktuar;", "D) vetore, me vetë të përgjithësuar."],
        correct: 1
    },
    {
        question: "21. Dalloni fjalinë e përbërë.",
        answers: ["A) Tej, nga lindja, kishte zënë të afrohej një re e bardhë.", "B) Nuk kam ndjerë në jetë një gëzim më të madh.", "C) Ky është shoku im më i mirë.", "D) Ngado që të hedhësh sytë përreth, ndien një kënaqësi të vërtetë."],
        correct: 3
    },
    {
        question: "22. Dalloni fjalinë e përbërë me pjesë të nënrenditur vendore.",
        answers: ["A) Ai ktheu kokën andej nga dëgjoheshin zëra", "B) Dera u hap, aq sa mund të kaloje me zor.", "C) Djali ua bëri me dorë, që të mos largoheshin.", "D) E kishte lënë derën hapur, ngaqë ishte bërë zagushi."],
        correct: 0
    },
    {
        question: "23. Dalloni fjalinë e përbërë me bashkërenditje.",
        answers: ["A) Sado që t'i fliste, nuk do ta ngushëllonte dot.", "B) Ata e lanë punën, kur dielli kishte perënduar.", "C) Hija e lisave tretej ngadalë, sikur përpihej nga toka.", "D) Nata po binte me shpejtësi, ndaj djali nxitoi këmbët."],
        correct: 3
    },
    {
        question: "24. Në cilën alternativë ligjërata e drejtë është shkruar saktë?",
        answers: ["A) Mësuesja i tha: erdhi radha e recitimit tënd.", "B) Mësuesja i tha: ''erdhi radha e recitimit tënd.'' ", "C) Mësuesja i tha:''Erdhi radha e recitimit tënd''.", "D) Mësuesja i tha ''Erdhi radha e recitimit tënd'' "],
        correct: 2
    }
];

let currentQuestion = 0;
let score = 0;
let timeLeft = 40;
let timer;

function loadQuestion() {
    clearInterval(timer);
    timeLeft = 40;
    document.getElementById("timer").innerText = "Koha: " + timeLeft;

    const q = quiz[currentQuestion];
    document.getElementById("question").innerText = q.question;

    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";
    document.getElementById("result").textContent = "";
    document.getElementById("nextBtn").style.display = "none";

    q.answers.forEach((answer, index) => {
        const btn = document.createElement("button");
        btn.innerText = answer;
        btn.onclick = () => checkAnswer(index);
        answersDiv.appendChild(btn);
    });

    timer = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").innerText = "Koha: " + timeLeft;
        if(timeLeft === 0) {
            clearInterval(timer);
            revealCorrect();
            document.getElementById("nextBtn").style.display = "block";
        }
    }, 1000);
}

function checkAnswer(index) {
    clearInterval(timer);
    const correctIndex = quiz[currentQuestion].correct;

    if(index === correctIndex) {
        score++;
    }

    revealCorrect();
    document.getElementById("nextBtn").style.display = "block";
}

function revealCorrect() {
    const buttons = document.querySelectorAll("#answers button");
    const correctIndex = quiz[currentQuestion].correct;

    buttons.forEach((btn, i) => {
        btn.disabled = true;
        if(i === correctIndex) {
            btn.classList.add("correct");
        }
    });
}

function nextQuestion() {
    currentQuestion++;
    if(currentQuestion < quiz.length) {
        loadQuestion();
    } else {
        showResults();
    }
}

function showResults() {
    const messages = {
        18: "Shkëlqyeshëm! Sukses i merituar! 🏆🌟",
        17: "Shumë mirë! Vazhdoni të synoni nivelin maksimal! 👏✨",
        16: "Shumë mirë! Vazhdoni të synoni nivelin maksimal! 👏✨",
        15: "Rezultat i mirë dhe premtues! 📚📈",
        14: "Rezultat i mirë dhe premtues! 📚📈",
        13: "Rezultat i mirë dhe premtues! 📚📈",
        12: "Jeni në rrugën e duhur! 💡🚀",
        11: "Jeni në rrugën e duhur! 💡🚀",
        10: "Jeni në rrugën e duhur! 💡🚀",
        9: "Mos u ndalni! Çdo provë ju bën më të fortë! 💪🔥",
        8: "Mos u ndalni! Çdo provë ju bën më të fortë! 💪🔥",
        7: "Mos u ndalni! Çdo provë ju bën më të fortë! 💪🔥",
        6: "Mos u ndalni! Çdo provë ju bën më të fortë! 💪🔥",
        5: "Mos u ndalni! Çdo provë ju bën më të fortë! 💪🔥",
        4: "Besoni në aftësitë tuaja! 😊",
        3: "Besoni në aftësitë tuaja! 😊",
        2: "Besoni në aftësitë tuaja! 😊",
        1: "Besoni në aftësitë tuaja! 😊",
        0: "Besoni në aftësitë tuaja! 😊"
    };

    let content = `
        <h2>Quiz përfundoi 🎉</h2>
        <p>Ke marrë <strong>${score}</strong> pikë nga <strong>${quiz.length}</strong></p>
        <p>${messages[score]}</p>
        <button onclick="window.location.href='../Konkursi Website.html'">
            Kthehu në faqen kryesore
        </button>
    `;

    document.querySelector(".quiz-container").innerHTML = content;
}

loadQuestion();
</script>

</body>
</html>
