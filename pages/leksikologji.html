<html>
<head>
    <meta charset="UTF-8">
    <title>Lojë Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
			background: white;
        }
		
        .quiz-container {
            background: #21CBF3;
            padding: 20px;
            width: 600px;
            border-radius: 30px;
            text-align: center;
        }
		
        button {
            display: block;
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
			background: white;
			border-radius: 15px;
        }

        .correct {
            background-color: #4CAF50;
            color: white;
        }

        .wrong {
            background-color: #f44336;
            color: white;
        }

        #nextBtn {
            display: none;
            background: white;
            color: black;
        }
		
		a{
		color:black;
		}
		
        #timer {
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2 id="question">Pyetja</h2>
    <div id="timer">Koha: 40</div>
    <div id="answers"></div>
    <button id="nextBtn" onclick="nextQuestion()">Pyetja tjetër</button>
</div>

<script>
    const quiz = [
        {
            question: "1. Përcaktoni fushën leksikore që kanë këto fjalë të veçanta: e bardha, e zeza, e verdha, e kuqja.",
            answers: ["A) Emra;", "B) Mbiemra;", "C) Folje;", "D) Ndajfolje."],
            correct: 0
        },
        {
            question: "2. Sinonimi i fjalës ''i bukur'' është:",
            answers: ["A) i shëmtuar;", "B) i madh;", "C) i hijshëm;", "D) i errët;"],
            correct: 2
        },
        {
            question: "3. Antonimi i fjalës ''ditë'' është:",
            answers: ["A) mëngjes;", "B) dritë;", "C) diell;", "D) natë."],
            correct: 3
        },
        {
            question: "4. Fjala ''dorë'' është përdorur në kuptim të drejtpërdrejtë në alternativën:",
            answers: ["A) ...dora e drejtësisë;", "B) ...ka rënë në duar të mira;", "C) ...kishte vrarë dorën;", "D) ...i jep dorë (në punë)."],
            correct: 2
        },
        {
            question: "5. Fjala ''udhë'' mund të ketë kuptime të ndryshme. Cila është figurative?",
            answers: ["A) Gjetëm udhën për në fshat.", "B) Ai gjeti udhën e suksesit.", "C) Udhët janë të gjata.", "D) Një udhë e re u hap."],
            correct: 1
        },
        {
            question: "6. Çfarë kuptimi ka fjala e urtë ''Mos i bëj gropën tjetrit, se bie vetë brenda''?",
            answers: ["A) E keqja kthehet te ai që e bën.", "B) Të mos bëjmë shaka.", "C) Gropa është e rrezikshme.", "D) Duhet të punosh fort."],
            correct: 0
        },
		{
            question: "7. Çfarë kuptimi ka shprehja frazeologjike: ''Mos e shiku gunën, por shiko punën''?",
            answers: ["A) Rrobat janë të rëndësishme.", "B) Njeriu gjykohet nga pamja.", "C) Njeriu gjykohet nga veprat.", "D) Duhet të vishes bukur."],
            correct: 2
        },
		{
            question: "8. Dalloni shprehjen frazeologjike.",
            answers: ["A) Gur-gur bëhet kalaja.", "B) Gjykon puna, s'gjykon guna.", "C) Bashkimi bën fuqinë.", "D) S'lë dy gur bashkë."],
            correct: 3  
        },
		{
            question: "9. Dalloni fjalën e urtë.",
            answers: ["A) S'i zënë këmbët dhe.", "B) Guna e huaj s'të mban ngrohtë.", "C) U bë pikë e vrer.", "D) S'e nxjerr qimen nga qulli."],
            correct: 1
        },
		{
            question: "10. Fjala e huaj ''abuzoj'' ka fjalën gjegjëse shqipe:",
            answers: ["A) nënshtroj", "B) dhunoj", "C) shpërdoroj", "D) përçmoj"],
            correct: 2
        }
    ];

    let currentQuestion = 0;
    let score = 0;
    let timeLeft = 40;
    let timer;

    function loadQuestion() {
        clearInterval(timer);
        timeLeft = 40;
        document.getElementById("timer").innerText = "Koha: " + timeLeft;

        timer = setInterval(() => {
            timeLeft--;
            document.getElementById("timer").innerText = "Koha: " + timeLeft;
            if (timeLeft === 0) {
                clearInterval(timer);
                disableButtons();
                document.getElementById("nextBtn").style.display = "block";
            }
        }, 1000);

        const q = quiz[currentQuestion];
        document.getElementById("question").innerText = q.question;

        const answersDiv = document.getElementById("answers");
        answersDiv.innerHTML = "";

        q.answers.forEach((answer, index) => {
            const btn = document.createElement("button");
            btn.innerText = answer;
            btn.onclick = () => checkAnswer(index, btn);
            answersDiv.appendChild(btn);
        });

        document.getElementById("nextBtn").style.display = "none";
    }

    function checkAnswer(index, button) {
        clearInterval(timer);
        const correctIndex = quiz[currentQuestion].correct;

        if (index === correctIndex) {
            button.classList.add("correct");
            score++;
        } else {
            button.classList.add("wrong");
        }

        disableButtons();
        document.getElementById("nextBtn").style.display = "block";
    }

    function disableButtons() {
        const buttons = document.querySelectorAll("#answers button");
        buttons.forEach(btn => btn.disabled = true);
    }

    function nextQuestion() {
        currentQuestion++;
        if (currentQuestion < quiz.length) {
            loadQuestion();
        } else {
            document.querySelector(".quiz-container").innerHTML = `
                <h2>Quiz përfundoi 🎉</h2>
                <p>Ke marrë <strong>${score}</strong> pikë nga <strong>${quiz.length}</strong></p>

            <button><a href =../"Konkursi Website.html"> Kthehu në faqen kryesore </a>
            `;
        }
    }

    loadQuestion();

</script>

</body>

</html>
