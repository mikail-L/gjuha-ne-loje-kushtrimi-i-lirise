<html>
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lojë Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
			background: white;
        }
		
        .quiz-container {
            background: #21CBF3;
            padding: 20px;
            width: 600px;
            border-radius: 30px;
            text-align: center;
        }
		
        button {
            display: block;
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
			background: white;
			border-radius: 15px;
        }

        .correct {
            background-color: #4CAF50;
            color: white;
        }

        .wrong {
            background-color: #f44336;
            color: white;
        }

        #nextBtn {
            display: none;
            background: white;
            color: black;
        }
		
		a{
		color:black;
		}
		
        #timer {
            font-weight: bold;
            margin-bottom: 10px;
        }
		
		.menu button{
		 box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }
		
		.menu button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2 id="question">Pyetja</h2>
    <div id="timer">Koha: 40</div>
    <div id="answers"></div>
   <div class="menu">
    <button id="nextBtn" onclick="nextQuestion()">Pyetja tjetër</button>
	</div>
</div>

<script>
    const quiz = [
        {
            question: "1. Fjala ''i pabesueshëm'' është:",
            answers: ["A) e thjeshtë;", "B) e përbërë;", "C) e përngjitur;", "D) e prejardhur."],
            correct: 3
        },
        {
            question: "2. Në cilën fjali është përdorur përemri i pacaktuar?",
            answers: ["A) A erdhi kush?", "B) Kush trokiti në derë?", "C) Kush mëson, fiton.", "D) Kush je ti?"],
            correct: 0
        },
        {
            question: "3. Dalloni fjalinë që ka folje njëvetore.",
            answers: ["A) Unë po mësoj.", "B) Sa më pëlqejnë ditët kur bie borë.", "C) A shkohet atje në këtë orë?", "D) Ana po këndon në dhomën e saj."],
            correct: 1
        },
        {
            question: "4. Dalloni kur fjala ''rrotull'' është përdorur si parafjalë.",
            answers: ["A) Ai bleu një rrotull djathi.", "B) Ajo po shikonte rrotull.", "C) Ana bëri një shëtitje rrotull kopshtit.", "D) Ajo bleu një rrotull letre të re."],
            correct: 2
        },
        {
            question: "5. Mjeshtërinë e të gdhendurit ai e kishte mësuar nga babai plak. Fjala ''mjeshtërinë'' kryen funksionin e:",
            answers: ["A) kundrinorit të zhdrejtë me parafjalë;", "B) kundrinorit të drejtë;", "C) kundrinorit të zhdrejtë pa parafjalë;", "D) rrethanor."],
            correct: 1
        },
        {
            question: "6. Kur filluam pushimet dimërore, ne të gjithë u gëzuam. Pjesa e nënrenditur është:",
            answers: ["A) ftilluese;", "B) kohore;", "C) vendore;", "D) rrjedhimore."],
            correct: 1
        },
		{
            question: "7. Unë ndihesha i plogët dhe nuk guxoja të bëja asnjë hap. Fjala ''i plogët'' kryen funksionin e:",
            answers: ["A) rrethanorit;", "B) përcaktorit;", "C) pëcaktorit kallëzuesor të kryefjalës;", "D) përcaktorit kallëzuesor të kundrinorit."],
            correct: 2
        },
		{
            question: "8. Dalloni fjalinë me pjesë të nënrenditur përcaktore.",
            answers: ["A) Fëmija, i cili gati sa s'po shpërthente në lot, u përgjigj për të tretën herë.", "B) Shkuan në malin e Dajtit, kur ra borë.", "C) Duhej të mësohesha, në qoftë se kisha ndër mend të kthehesha në Tokë.", "D) Kur ecte nëpër kopsht, kishte një ndjenjë të veçantë."],
            correct: 0
        },
		{
            question: "9. Cila nga alternativat është shkruar saktë?",
            answers: ["A) Gazetari e pyeti këngëtaren:''a mund të bëjmë një emision për këngën qytetare?''", "B) Gazetari e pyeti këngëtaren ''A mund të bëjmë një emision për këngën qytetare?''", "C) Gazetari e pyeti këngëtaren: A mund të bëjmë një emision për këngën qytetare?", "D) Gazetari e pyeti këngëtaren:''A mund të bëjmë një emision për këngën qytetare?''"],
            correct: 3
        },
		{
            question: "10. Dalloni fjalinë pyetëse tërësore.",
            answers: ["A) Mos jeni dhe ju në grupin tonë?", "B) Ku banon?", "C) Kush e pati mendjen te ne?", "D) Kush jeni ju?"],
            correct: 0
        }
    ];

    let currentQuestion = 0;
    let score = 0;
    let timeLeft = 40;
    let timer;

    function loadQuestion() {
        clearInterval(timer);
        timeLeft = 40;
        document.getElementById("timer").innerText = "Koha: " + timeLeft;

        timer = setInterval(() => {
            timeLeft--;
            document.getElementById("timer").innerText = "Koha: " + timeLeft;
            if (timeLeft === 0) {
                clearInterval(timer);
                disableButtons();
                document.getElementById("nextBtn").style.display = "block";
            }
        }, 1000);

        const q = quiz[currentQuestion];
        document.getElementById("question").innerText = q.question;

        const answersDiv = document.getElementById("answers");
        answersDiv.innerHTML = "";

        q.answers.forEach((answer, index) => {
            const btn = document.createElement("button");
            btn.innerText = answer;
            btn.onclick = () => checkAnswer(index, btn);
            answersDiv.appendChild(btn);
        });

        document.getElementById("nextBtn").style.display = "none";
    }

    function checkAnswer(index, button) {
        clearInterval(timer);
        const correctIndex = quiz[currentQuestion].correct;

        if (index === correctIndex) {
            button.classList.add("correct");
            score++;
        } else {
            button.classList.add("wrong");
        }

        disableButtons();
        document.getElementById("nextBtn").style.display = "block";
    }

    function disableButtons() {
        const buttons = document.querySelectorAll("#answers button");
        buttons.forEach(btn => btn.disabled = true);
    }

    function nextQuestion() {
    currentQuestion++;

    if (currentQuestion < quiz.length) {
        loadQuestion();
    } else {

        let content = `
            <h2>Quiz përfundoi 🎉</h2>
            <p>Ke marrë <strong>${score}</strong> pikë nga <strong>${quiz.length}</strong></p>
        `;

        if (score === 10) {
            content += `<p>Suksesi është fryt i dijes. Urime për arritjen maksimale! 🏆</p>`;
		} else if (score === 9) {
			content += `<p>Rezultat shumë i mirë! Jeni një hap larg rezultatit maksimal. Vazhdoni të punoni me përkushtim! 👏🔥 </p>`;
		} else if (score === 8) {
			content += `<p>Rezultat shumë i mirë! Jeni një hap larg rezultatit maksimal. Vazhdoni të punoni me përkushtim! 👏🔥 </p>`;
		} else if (score === 7) {
			content += `<p>Rezultat i mirë! Suksesi ndërtohet hap pas hapi. 🌟📈</p>`;
		} else if (score === 6) {
			content += `<p>Rezultat i mirë! Suksesi ndërtohet hap pas hapi. 🌟📈</p>`;
		} else if (score === 5) {
			content += `<p>Rezultat i mirë! Suksesi ndërtohet hap pas hapi. 🌟📈</p>`;
		} else if (score === 4) {
			content += `<p>Çdo sfidë është një mundësi për të mësuar. Provojeni sërish dhe do të shihni përmirësim! 😊</p>`;
		} else if (score === 3) {
			content += `<p>Çdo sfidë është një mundësi për të mësuar. Provojeni sërish dhe do të shihni përmirësim! 😊</p>`;
		} else if (score === 2) {
			content += `<p>Çdo sfidë është një mundësi për të mësuar. Provojeni sërish dhe do të shihni përmirësim! 😊</p>`;
		} else if (score === 1) {
			content += `<p>Çdo sfidë është një mundësi për të mësuar. Provojeni sërish dhe do të shihni përmirësim! 😊</p>`;
        } else if (score === 0) {
            content += `<p>Çdo sfidë është një mundësi për të mësuar. Provojeni sërish dhe do të shihni përmirësim! 😊</p>`;
        }

        content += `
            <button onclick="window.location.href='../Konkursi Website.html'">
                Kthehu në faqen kryesore
            </button>
        `;

        document.querySelector(".quiz-container").innerHTML = content;
    }
}

    loadQuestion();

</script>

</body>

</html>
