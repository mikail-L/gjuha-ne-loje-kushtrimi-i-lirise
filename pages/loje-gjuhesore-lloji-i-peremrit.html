<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Gjeni llojin e përemrit</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #fafafa; }
        .game-container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 500px; text-align: center; }
        
        .stats { display: flex; justify-content: space-between; margin-bottom: 30px; font-weight: bold; color: #888; }
        #word-display { font-size: 2.5rem; color: #d36a4a; margin: 20px 0; }
        
        .button-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 30px; }
        /* Added the transition here */
        .game-btn { padding: 15px 10px; background: #f5f2ed; border: 1px solid #e0dcd5; border-radius: 10px; cursor: pointer; font-weight: bold; transition: background-color 0.2s, color 0.2s; }
        .game-btn:hover { background: #e8e4dc; }
        
        /* New classes for correct and incorrect answers */
        .correct { background-color: #4caf50 !important; color: white !important; border-color: #4caf50 !important; }
        .incorrect { background-color: #f44336 !important; color: white !important; border-color: #f44336 !important; }
        
        #game-over { display: none; }
        .nav-btn { margin-top: 10px; padding: 10px 20px; cursor: pointer; display: block; width: 100%; border: none; border-radius: 10px; background: #eee; }
        .restart-btn { background: #d36a4a; color: white; }
    </style>
    <script type="module">
        import { inject } from 'https://cdn.jsdelivr.net/npm/@vercel/analytics@2/dist/index.mjs';
        inject();
    </script>
</head>
<body>

<div class="game-container" id="game-ui">
    <div class="stats">
        <div>Pikë: <span id="score">0</span>/10</div>
        <div>Koha e mbetur: <span id="timer">20s</span></div>
    </div>

    <p>Gjeni llojin e përemrit:</p>
    <h1 id="word-display">këtë</h1>

    <!-- Added 'this' to all buttons and removed the duplicate 'përemër pyetës' -->
    <div class="button-grid" id="button-grid">
        <button class="game-btn" onclick="processAnswer('përemër dëftor', this)">Përemër dëftor</button>
        <button class="game-btn" onclick="processAnswer('përemër lidhor', this)">Përemër lidhor</button>
        <button class="game-btn" onclick="processAnswer('përemër vetor', this)">Përemër vetor</button>
        <button class="game-btn" onclick="processAnswer('përemër vetvetor', this)">Përemër vetvetor</button>
        <button class="game-btn" onclick="processAnswer('përemër pronor', this)">Përemër pronor</button>
        <button class="game-btn" onclick="processAnswer('përemër pyetës', this)">Përemër pyetës</button>
        <button class="game-btn" onclick="processAnswer('përemër i pacaktuar', this)">Përemër i pacaktuar</button>
    </div>
</div>

<div class="game-container" id="game-over">
    <h1>Loja përfundoi!</h1>
    <p>Pikët tuaja përfundimtare: <span id="final-score">0</span>/10</p>
    
    <button class="nav-btn restart-btn" onclick="location.reload()">Luani përsëri</button>
    <button class="nav-btn" onclick="window.location.href='../index.html'">Kthehuni në faqen kryesore</button>
</div>

<script>
    const gameData = [
        {word: "këtë", type: "përemër dëftor"},
        {word: "që", type: "përemër lidhor"},
        {word: "vetja", type: "përemër vetvetor"},
        {word: "unë", type: "përemër vetor"},
        {word: "Disa", type: "përemër i pacaktuar"},
        {word: "i cili", type: "përemër lidhor"},
        {word: "im", type: "përemër pronor"},
        {word: "Kush?", type: "përemër pyetës"},
        {word: "ti", type: "përemër vetor"},
        {word: "i tillë", type: "përemër dëftor"}
    ];

    let currentIndex = 0;
    let score = 0;
    let timeLeft = 30;
    let timerInterval;

    // Removed the duplicate initializeLayout() function
    function initializeLayout() {
        const grid = document.getElementById('button-grid');
        for (let i = grid.children.length; i >= 0; i--) {
            grid.appendChild(grid.children[Math.random() * i | 0]);
        }
    }

    function startTimer() {
        timeLeft = 30;
        document.getElementById('timer').innerText = timeLeft + "s";
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft + "s";
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                processAnswer(null, null); // Handles timeout
            }
        }, 1000);
    }

    function processAnswer(selected, btnElement) {
        clearInterval(timerInterval);
        
        // Disable all buttons to prevent spam clicking
        const buttons = document.querySelectorAll('.game-btn');
        buttons.forEach(btn => btn.style.pointerEvents = 'none');

        const isCorrect = selected === gameData[currentIndex].type;

        if (isCorrect) {
            score++;
            document.getElementById('score').innerText = score;
        }
        
        // Apply colors
        if (btnElement) {
            if (isCorrect) {
                btnElement.classList.add('correct');
            } else {
                btnElement.classList.add('incorrect');
            }
        }

        // Wait 800ms before moving on
        setTimeout(() => {
            // Remove colors and re-enable clicks
            if (btnElement) {
                btnElement.classList.remove('correct', 'incorrect');
            }
            buttons.forEach(btn => btn.style.pointerEvents = 'auto');

            currentIndex++;
            if (currentIndex < gameData.length) {
                document.getElementById('word-display').innerText = gameData[currentIndex].word;
                startTimer();
            } else {
                document.getElementById('game-ui').style.display = 'none';
                document.getElementById('game-over').style.display = 'block';
                document.getElementById('final-score').innerText = score;
            }
        }, 800); 
    }
    

    initializeLayout();
    startTimer();
</script>

</body>
</html>
