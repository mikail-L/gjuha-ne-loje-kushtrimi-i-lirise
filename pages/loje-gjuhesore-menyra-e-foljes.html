<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Dalloni mënyrën e foljes</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #fafafa; }
        .game-container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 550px; text-align: center; }
        
        .stats { display: flex; justify-content: space-between; margin-bottom: 30px; font-weight: bold; color: #888; }
        #word-display { font-size: 2rem; color: #d36a4a; margin: 20px 0; }
        
        .button-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 30px; }
        .game-btn { padding: 15px 10px; background: #f5f2ed; border: 1px solid #e0dcd5; border-radius: 10px; cursor: pointer; font-weight: bold; transition: background-color 0.2s, color 0.2s; }
        .game-btn:hover { background: #e8e4dc; }
        
        .correct { background-color: #4caf50 !important; color: white !important; border-color: #4caf50 !important; }
        .incorrect { background-color: #f44336 !important; color: white !important; border-color: #f44336 !important; }
        
        #game-over { display: none; }
        .nav-btn { margin-top: 10px; padding: 10px 20px; cursor: pointer; display: block; width: 100%; border: none; border-radius: 10px; background: #eee; }
        .restart-btn { background: #d36a4a; color: white; }
    </style>
    <script type="module">
        import { inject } from 'https://cdn.jsdelivr.net/npm/@vercel/analytics@2/dist/index.mjs';
        inject();
    </script>
</head>
<body>

<div class="game-container" id="game-ui">
    <div class="stats">
        <div>Pikë: <span id="score">0</span>/10</div>
        <div>Koha e mbetur: <span id="timer">20s</span></div>
    </div>

    <p>Dalloni mënyrën e foljes:</p>
    <h1 id="word-display">mësoj</h1>

    <div class="button-grid" id="button-grid">
        <button class="game-btn" onclick="processAnswer('mënyra dëftore', this)">Mënyra dëftore</button>
        <button class="game-btn" onclick="processAnswer('mënyra lidhore', this)">Mënyra lidhore</button>
        <button class="game-btn" onclick="processAnswer('mënyra habitore', this)">Mënyra habitore</button>
        <button class="game-btn" onclick="processAnswer('mënyra dëshirore', this)">Mënyra dëshirore</button>
        <button class="game-btn" onclick="processAnswer('mënyra kushtore', this)">Mënyra kushtore</button>
        <button class="game-btn" onclick="processAnswer('mënyra urdhërore', this)">Mënyra urdhërore</button>
    </div>
</div>

<div class="game-container" id="game-over">
    <h1>Loja përfundoi!</h1>
    <p>Pikët tuaja përfundimtare: <span id="final-score">0</span>/10</p>
    
    <button class="nav-btn restart-btn" onclick="location.reload()">Luani përsëri</button>
    <button class="nav-btn" onclick="window.location.href='../index.html'">Kthehuni në faqen kryesore</button>
</div>

<script>
    const gameData = [
        {word: "mësoj", type: "mënyra dëftore"},
        {word: "të dëgjoja", type: "mënyra lidhore"},
        {word: "punova", type: "mënyra dëftore"},
        {word: "mësuakam", type: "mënyra habitore"},
        {word: "paça punuar", type: "mënyra dëshirore"},
        {word: "do të kishte mbaruar, nëse...", type: "mënyra kushtore"},
        {word: "dëgjo", type: "mënyra urdhërore"},
        {word: "qofsh", type: "mënyra dëshirore"},
        {word: "do të kishte mësuar", type: "mënyra dëftore"},
        {word: "të kem parë", type: "mënyra lidhore"}
    ];

    let currentIndex = 0;
    let score = 0;
    let timeLeft = 30;
    let timerInterval;

    function startTimer() {
        timeLeft = 30;
        document.getElementById('timer').innerText = timeLeft + "s";
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft + "s";
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                processAnswer(null, null);
            }
        }, 1000);
    }

    function processAnswer(selected, btnElement) {
        clearInterval(timerInterval);
        
        const buttons = document.querySelectorAll('.game-btn');
        buttons.forEach(btn => btn.style.pointerEvents = 'none');

        const isCorrect = selected === gameData[currentIndex].type;

        if (isCorrect) {
            score++;
            document.getElementById('score').innerText = score;
        }
        
        if (btnElement) {
            if (isCorrect) {
                btnElement.classList.add('correct');
            } else {
                btnElement.classList.add('incorrect');
            }
        }

        setTimeout(() => {
            if (btnElement) {
                btnElement.classList.remove('correct', 'incorrect');
            }
            buttons.forEach(btn => btn.style.pointerEvents = 'auto');

            currentIndex++;
            if (currentIndex < gameData.length) {
                document.getElementById('word-display').innerText = gameData[currentIndex].word;
                startTimer();
            } else {
                document.getElementById('game-ui').style.display = 'none';
                document.getElementById('game-over').style.display = 'block';
                document.getElementById('final-score').innerText = score;
            }
        }, 800); 
    }

    startTimer();
</script>

</body>
</html>
