<html>
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lojë Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
			background: white;
        }
		
        .quiz-container {
            background: #21CBF3;
            padding: 20px;
            width: 600px;
            border-radius: 30px;
            text-align: center;
        }
		
        button {
            display: block;
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
			background: white;
			border-radius: 15px;
        }

        .correct {
            background-color: #4CAF50;
            color: white;
        }

        .wrong {
            background-color: #f44336;
            color: white;
        }

        #nextBtn {
            display: none;
            background: white;
            color: black;
        }
		
		a{
		color:black;
		}
		
        #timer {
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2 id="question">Pyetja</h2>
    <div id="timer">Koha: 40</div>
    <div id="answers"></div>
    <button id="nextBtn" onclick="nextQuestion()">Pyetja tjetër</button>
</div>

<script>
    const quiz = [
        {
            question: "1. Teksti rrëfimtar letrar:",
            answers: ["A) shpreh ndjenjat dhe sjell imazhe artistike;", "B) rrëfen ngjarje nga jeta e personazheve;", "C) përshkruan njerëz;, kafshë, sende;", "D) sjell informacione nga fusha të ndryshme."],
            correct: 1
        },
        {
            question: "2. Lloji i tekstit letrar është:",
            answers: ["A) biografia;", "B) autobiografia;", "C) novela;", "D) intervista."],
            correct: 2
        },
        {
            question: "3. Tekstet joletrare i përdorim:",
            answers: ["A) për zhvillimin e imagjinatës;", "B) për edukimin e ndjenjave;", "C) për kënaqësinë e të lexuarit;", "D) për të pasuruar kulturën vetjake."],
            correct: 3
        },
        {
            question: "4. Njoftimi është një tekst joletrar, nëpërmjet të cilit, ai që shkruan:",
            answers: ["A) shtjellon ngjarje të vërteta njëra pas tjetrës, sipas kohës kur kanë ndodhur;", "B) përcjell një mesazh në formën e lajmërimit për atë që e lexon;", "C) regjistron ditë për ditë gjërat që ai i konsideron më të rëndësishme;", "D) dëshiron t'i bëjë publike ngjarjet e jetës së tij."],
            correct: 1
        },
        {
            question: "5.Autori i romanit ''Hajdutja e librave'' është:",
            answers: ["A) B.Brunet;", "B) M.Zusak;", "C) D.Hoshtfeld;", "D) M.Kuteli."],
            correct: 1
        },
        {
            question: "6. Tema e mjedisit trajtohet në tregimin:",
            answers: ["A) Unë një e Çuli dy (M.Kuteli);", "B) Marko Boçari (F.Ballanca);", "C) Vdekja e lisnajës (A.Papleka);", "D) Kërcimtarja e Dukagjinit (E.Koliqi)."],
            correct: 2
        },
		{
            question: "7. Në vargun ''E ka qerpikun si të dallandyshes'', kemi:",
            answers: ["A) metaforë;", "B) personfikim;", "C) epitet;", "D) krahasim."],
            correct: 3
        },
		{
            question: "8. Rima është:",
            answers: ["A) përputhja e tingujve në fund të dy a më shumë vargjeve;", "B) përsëritja e rregullt e rrokjeve të dy a më shumë vargjeve;", "C) një grup vargjesh të lidhura ndërmjet tyre me anë të ritmit;", "D) njësi poetike që ka një ritëm."],
            correct: 0
        }
    ];

    let currentQuestion = 0;
    let score = 0;
    let timeLeft = 40;
    let timer;

    function loadQuestion() {
        clearInterval(timer);
        timeLeft = 40;
        document.getElementById("timer").innerText = "Koha: " + timeLeft;

        timer = setInterval(() => {
            timeLeft--;
            document.getElementById("timer").innerText = "Koha: " + timeLeft;
            if (timeLeft === 0) {
                clearInterval(timer);
                disableButtons();
                document.getElementById("nextBtn").style.display = "block";
            }
        }, 1000);

        const q = quiz[currentQuestion];
        document.getElementById("question").innerText = q.question;

        const answersDiv = document.getElementById("answers");
        answersDiv.innerHTML = "";

        q.answers.forEach((answer, index) => {
            const btn = document.createElement("button");
            btn.innerText = answer;
            btn.onclick = () => checkAnswer(index, btn);
            answersDiv.appendChild(btn);
        });

        document.getElementById("nextBtn").style.display = "none";
    }

    function checkAnswer(index, button) {
        clearInterval(timer);
        const correctIndex = quiz[currentQuestion].correct;

        if (index === correctIndex) {
            button.classList.add("correct");
            score++;
        } else {
            button.classList.add("wrong");
        }

        disableButtons();
        document.getElementById("nextBtn").style.display = "block";
    }

    function disableButtons() {
        const buttons = document.querySelectorAll("#answers button");
        buttons.forEach(btn => btn.disabled = true);
    }

    function nextQuestion() {
        currentQuestion++;
        if (currentQuestion < quiz.length) {
            loadQuestion();
        } else {
            document.querySelector(".quiz-container").innerHTML = `
                <h2>Quiz përfundoi 🎉</h2>
                <p>Ke marrë <strong>${score}</strong> pikë nga <strong>${quiz.length}</strong></p>

            <button><a href ="../Konkursi Website.html"> Kthehu në faqen kryesore </a>
            `;
        }
    }

    loadQuestion();

</script>

</body>

</html>
