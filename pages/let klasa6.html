<html>
<head>
    <meta charset="UTF-8">
    <title>Lojë Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
			background: white;
        }
		
        .quiz-container {
            background: #21CBF3;
            padding: 20px;
            width: 600px;
            border-radius: 30px;
            text-align: center;
        }
		
        button {
            display: block;
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
			background: white;
			border-radius: 15px;
        }

        .correct {
            background-color: #4CAF50;
            color: white;
        }

        .wrong {
            background-color: #f44336;
            color: white;
        }

        #nextBtn {
            display: none;
            background: white;
            color: black;
        }
		
		a{
		color:black;
		}
		
        #timer {
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2 id="question">Pyetja</h2>
    <div id="timer">Koha: 40</div>
    <div id="answers"></div>
    <button id="nextBtn" onclick="nextQuestion()">Pyetja tjetër</button>
</div>

<script>
    const quiz = [
        {
            question: "1. Ftesa është:",
            answers: ["A) një tregim i shkurtër;", "B) një tekst funksional për të ftuar dikë;", "C) një mjet elektronik;", "D) një lajm."],
            correct: 1
        },
        {
            question: "2. Gjinitë letrare janë:",
            answers: ["A) poezia, romani, tregimi;", "B) përralla, fabula, legjenda;", "C) epika, lirika, dramatika;", "D) komedia, tragjedia, drama."],
            correct: 2
        },
        {
            question: "3. Veprat që kanë si qëllim rrëfimin përfshihen në:",
            answers: ["A) gjininë epike;", "B) gjininë dramatike;", "C) gjininë lirike;", "D) tekstin poetik."],
            correct: 0
        },
        {
            question: "4. Te fragmenti ''Kënga e Rolandit'', Rolandi nuk pranoi t'i binte bririt, sepse:",
            answers: ["A) ishte krenar;", "B) ishte betuar që do të luftonte deri në vdekje për Francën;", "C) ishte mendjemadh;", "D) nuk i dhimbsej ushtria e tij."],
            correct: 1
        },
        {
            question: "5. I përket letërsisë gojore:",
            answers: ["A) E bija e Hënës dhe e Diellit;", "B) Nuk është e lehtë të harrosh;", "C) Poezia e parë;", "D) Kënga e Rolandit."],
            correct: 3
        },
        {
            question: "6. Poezia ''Mëngjes'' është shkruar nga poeti:",
            answers: ["A) Naim Frashëri;", "B) Ndrem Njeda;", "C) Lasgush Poradeci;", "D) Ismail Kadare."],
            correct: 2
        },
		{
            question: "7. Mesazhi se e ardhmja e një kombi varet nga brezi i ri që ai edukon, del te poezia:",
            answers: ["A) Deti (F.Arapi);", "B) Me jetue (A.Podrimja);", "C)Atdheu (N.Frashëri);", "D) Pamje (Asdreni)."],
            correct: 1
        },
		{
            question: "8. Figura letrare ''Dielli u shua në mal'' është:",
            answers: ["A) metaforë;", "B) personifikim;", "C) epitet;", "D) hiperbolë."],
            correct: 0
        }
    ];

    let currentQuestion = 0;
    let score = 0;
    let timeLeft = 40;
    let timer;

    function loadQuestion() {
        clearInterval(timer);
        timeLeft = 40;
        document.getElementById("timer").innerText = "Koha: " + timeLeft;

        timer = setInterval(() => {
            timeLeft--;
            document.getElementById("timer").innerText = "Koha: " + timeLeft;
            if (timeLeft === 0) {
                clearInterval(timer);
                disableButtons();
                document.getElementById("nextBtn").style.display = "block";
            }
        }, 1000);

        const q = quiz[currentQuestion];
        document.getElementById("question").innerText = q.question;

        const answersDiv = document.getElementById("answers");
        answersDiv.innerHTML = "";

        q.answers.forEach((answer, index) => {
            const btn = document.createElement("button");
            btn.innerText = answer;
            btn.onclick = () => checkAnswer(index, btn);
            answersDiv.appendChild(btn);
        });

        document.getElementById("nextBtn").style.display = "none";
    }

    function checkAnswer(index, button) {
        clearInterval(timer);
        const correctIndex = quiz[currentQuestion].correct;

        if (index === correctIndex) {
            button.classList.add("correct");
            score++;
        } else {
            button.classList.add("wrong");
        }

        disableButtons();
        document.getElementById("nextBtn").style.display = "block";
    }

    function disableButtons() {
        const buttons = document.querySelectorAll("#answers button");
        buttons.forEach(btn => btn.disabled = true);
    }

    function nextQuestion() {
        currentQuestion++;
        if (currentQuestion < quiz.length) {
            loadQuestion();
        } else {
            document.querySelector(".quiz-container").innerHTML = `
                <h2>Quiz përfundoi 🎉</h2>
                <p>Ke marrë <strong>${score}</strong> pikë nga <strong>${quiz.length}</strong></p>

            <button><a href ="../Konkursi Website.html"> Kthehu ne main menu </a>
            `;
        }
    }

    loadQuestion();

</script>

</body>

</html>
