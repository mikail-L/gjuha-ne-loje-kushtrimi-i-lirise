<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
 <style>
h2, h3 {
      text-align: center;
    }

    input, textarea, button {
      display: block;
      width: 100%;
      max-width: 420px;
      margin: 10px auto;
      padding: 10px;
      font-size: 1em;
      box-sizing: border-box;
    }

    button {
      background-color: #333;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      transition: 0.3s;
    }

    button:hover {
      background-color: #555;
    }

    #lista-komenteve {
      max-width: 420px;
      margin: 0 auto;
      padding: 10px;
    }

    .comment {
      background: #f4f4f4;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 6px;
		margin-left:auto;
		margin-right:auto;
    }

    .date {
      font-size: 0.8em;
      color: #666;
      text-align: right;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <h2>Lini një koment</h2>
  <input type="text" id="emri" placeholder="Emri juaj..." />
  <textarea id="mesazhi" placeholder="Shkruani komentin këtu..."></textarea>
  <button onclick="shtoKoment()">Dërgo</button>

  <hr>
  <h3>Komentet e fundit:</h3>
  <div id="lista-komenteve">Po ngarkohen...</div>
 <script>
 // ----------------------------------------------------
 // KONFIGURIMI I SUPABASE
 // Zëvendësoni këto me të dhënat tuaja nga Supabase
 // ----------------------------------------------------
 const SUPABASE_URL = 'https://aykznvjeqqoterxixrko.supabase.co';
 const SUPABASE_KEY ='sb_publishable_OSrczdbbBVr91dZY6orjAg_0tcLvigs';

 // Krijojmë lidhjen
const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);
 // ----------------------------------------------------
 // FUNKSIONI 1: MARRJA E KOMENTEVE
 // ----------------------------------------------------
 async function merrKomentet() {
 const container = document.getElementById('lista-komenteve');

 // Kërkojmë të dhënat nga tabela 'comments'
 // I rendisim sipas kohës (më të rejat sipër)
 const { data, error } = await supabaseClient
 .from('comments')
 .select('*')
 .order('created_at', { ascending: false });
 if (error) {
 console.error("Gabim:", error);
 container.innerHTML = "Pati një problem me ngarkimin e komenteve.";
 return;
 }
 // Pastrojmë tekstin 'Po ngarkohen...'
 container.innerHTML = '';
 // Për çdo koment që gjetëm, krijojmë HTML
 data.forEach(koment => {
 const div = document.createElement('div');
 div.className = 'comment';
 // Përdorim escapeHtml për siguri (shih më poshtë)
 div.innerHTML = `
 <strong>${escapeHtml(koment.username)}</strong>
 <p>${escapeHtml(koment.message)}</p>
 `;
 container.appendChild(div);
 });
 }
 // ----------------------------------------------------
 // FUNKSIONI 2: SHTIMI I NJË KOMENTI
 // ----------------------------------------------------
 async function shtoKoment() {
 const emriInput = document.getElementById('emri');
 const mesazhiInput = document.getElementById('mesazhi');

 const emri = emriInput.value;
 const mesazhi = mesazhiInput.value;
 if (!emri || !mesazhi) {
 alert("Ju lutem plotësoni të dyja fushat!");
 return;
 }
 // Dërgojmë të dhënat në tabelën 'comments'
 const { error } = await supabaseClient
 .from('comments')
 .insert([{ username: emri, message: mesazhi }]);
 if (error) {
 console.error("Gabim:", error);
 alert("Komentet nuk u dërgua. Kontrolloni konsolën.");
 } else {
 // Pastrojmë fushat dhe ringarkojmë listën
 emriInput.value = '';
 mesazhiInput.value = '';
 merrKomentet();
 }
 }
 // ----------------------------------------------------
 // FUNKSIONI NDIHMËS PËR SIGURINË (XSS)
 // Kjo parandalon që njerëzit të fusin kode të dëmshme si <script>
 // ----------------------------------------------------
 function escapeHtml(text) {
 if (!text) return text;
 return text
 .replace(/&/g, "&amp;")
 .replace(/</g, "&lt;")
 .replace(/>/g, "&gt;")
 .replace(/"/g, "&quot;")
 .replace(/'/g, "&#039;");
 }
 // Nisim marrjen e komenteve sapo hapet faqja
 merrKomentet();
