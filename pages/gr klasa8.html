<html>
<head>
    <meta charset="UTF-8">
    <title>Lojë Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
			background: white;
        }
		
        .quiz-container {
            background: #21CBF3;
            padding: 20px;
            width: 600px;
            border-radius: 30px;
            text-align: center;
        }
		
        button {
            display: block;
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
			background: white;
			border-radius: 15px;
        }

        .correct {
            background-color: #4CAF50;
            color: white;
        }

        .wrong {
            background-color: #f44336;
            color: white;
        }

        #nextBtn {
            display: none;
            background: white;
            color: black;
        }
		
		a{
		color:black;
		}
		
        #timer {
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2 id="question">Pyetja</h2>
    <div id="timer">Koha: 20</div>
    <div id="answers"></div>
    <button id="nextBtn" onclick="nextQuestion()">Pyetja tjetër</button>
</div>

<script>
    const quiz = [
        {
            question: "Cila fjalë është futur gabim sipas formimit?",
            answers: ["ditë", "ushqim", "ditar", "mësoj"],
            correct: 0
        },
        {
            question: "Është në formën joveprore, mënyra dëshirore, folja në fjalinë:",
            answers: ["Njeriu u mësuakësh dhe me këto kushte.", "Ai qenkësh emëruar diku tjetër këto kohë.", "Po ti u rritsh e u bëfsh sa malet!", "Do të ndihesha më mirë, po të kishe ardhur dhe ti."],
            correct: 2
        },
        {
            question: "Cili përemër është futur gabim sipas llojit?",
            answers: ["shkëlqimin e vet", "peshën e saj", "të ftohtët e tyre", "kangjella të tjera"],
            correct: 3
        },
        {
            question: "Në cilin rast, fjala në thonjëza është ndajfolje?",
            answers: ["E kaloi dorën ''pas'' qafe.", "Përkujdesej nga ''afër'' për shëndetin tim.", "Bashkohej ''përmes'' një porte të dyfishtë.", "Ajo u ul ''buzë'' krevatit."],
            correct: 1
        },
        {
            question: "Gjej fjalën e shkruar gabim:",
            answers: ["rracë", "rregull", "ëndrra", "radhë"],
            correct: 0
        },
        {
            question: "Cila nga alternativat ka kallëzues foljor të përbërë?",
            answers: ["Cila është gjëja më e rëndëshishme në jetë?", "Babai ka punuar tërë jeten me ndershmëri.", "Shtëpia qe plot dritë.", "Ai nisi të këndonte shumë bukur."],
            correct: 3
        },
		{
            question: "Gjej ndajshtimin në alternativat e dhëna.",
            answers: ["Ti i the nënës se të solli yt vëlla?", "Ajo është me origjinë shqiptare.", "Mësuese Mira vjen të hënën në mësim.", "Unë e dua këtë qytet."],
            correct: 2
        },
		{
            question: "Dalloni kundrinorin e drejtë:",
            answers: ["U çoi bukë miqve.", "Nxënësit e lavdëruan të gjithë.", "Të foli nëna?", "Më erdhi keq për gjyshen."],
            correct: 1
        },
		{
            question: "Në cilën alternativë është përdorur fjalia e përbërë ftilluese?",
            answers: ["E mira do të ishte që ju të punoni çdo ditë për këtë projekt...", "Në vesh kam shprehjet që ai i përdorte gjithmonë.", "Ishte përqafimi i tim eti, që më bënte të lumtur.", "Kur fillova të lexoja, të gjithë heshtën."],
            correct: 0
        },
		{
            question: "Ata lanë punën, kur dielli kishte perënduar. Pjesa e nënrenditur është:",
            answers: ["vendore", "qëllimore", "kohore", "përcaktore"],
            correct: 2
        }
    ];

    let currentQuestion = 0;
    let score = 0;
    let timeLeft = 20;
    let timer;

    function loadQuestion() {
        clearInterval(timer);
        timeLeft = 20;
        document.getElementById("timer").innerText = "Koha: " + timeLeft;

        timer = setInterval(() => {
            timeLeft--;
            document.getElementById("timer").innerText = "Koha: " + timeLeft;
            if (timeLeft === 0) {
                clearInterval(timer);
                disableButtons();
                document.getElementById("nextBtn").style.display = "block";
            }
        }, 1000);

        const q = quiz[currentQuestion];
        document.getElementById("question").innerText = q.question;

        const answersDiv = document.getElementById("answers");
        answersDiv.innerHTML = "";

        q.answers.forEach((answer, index) => {
            const btn = document.createElement("button");
            btn.innerText = answer;
            btn.onclick = () => checkAnswer(index, btn);
            answersDiv.appendChild(btn);
        });

        document.getElementById("nextBtn").style.display = "none";
    }

    function checkAnswer(index, button) {
        clearInterval(timer);
        const correctIndex = quiz[currentQuestion].correct;

        if (index === correctIndex) {
            button.classList.add("correct");
            score++;
        } else {
            button.classList.add("wrong");
        }

        disableButtons();
        document.getElementById("nextBtn").style.display = "block";
    }

    function disableButtons() {
        const buttons = document.querySelectorAll("#answers button");
        buttons.forEach(btn => btn.disabled = true);
    }

    function nextQuestion() {
        currentQuestion++;
        if (currentQuestion < quiz.length) {
            loadQuestion();
        } else {
            document.querySelector(".quiz-container").innerHTML = `
                <h2>Quiz përfundoi 🎉</h2>
                <p>Ke marrë <strong>${score}</strong> pikë nga <strong>${quiz.length}</strong></p>

            <button><a href ="../Konkursi Website.html"> Kthehu në faqen kryesore </a>
            `;
        }
    }

    loadQuestion();

</script>

</body>

</html>
