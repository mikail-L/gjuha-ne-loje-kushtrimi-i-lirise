<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klasa e nëntë</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #fef3c7, #f8fbff);
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
      width: 100%;
      max-width: 560px;
    }
    h1 { margin-top: 0; color: #b45309; }
    .button-group { display: grid; gap: 12px; margin-top: 20px; }
    .button {
      display: block;
      padding: 12px 16px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
      transition: transform 0.2s ease;
    }
    .button:hover { transform: scale(1.02); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Klasa e nëntë</h1>
    <div class="button-group">
      <a class="button" href="gramatike-klasa-e-nente.html">Përdorimi i drejtë i gjuhës</a>
      <a class="button" href="te-lexuarit-klasa-e-nente.html">Të lexuarit e teksteve të ndryshme</a>
      <a class="button" href="provimet-kombetare.html">Përgatitje për Provimet Kombëtare të Arsimit Bazë</a>
    </div>
  </div>
</body>
</html>
