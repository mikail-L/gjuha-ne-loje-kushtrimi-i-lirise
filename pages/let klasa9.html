<html>
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lojë Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
			background: white;
        }
		
        .quiz-container {
            background: #21CBF3;
            padding: 20px;
            width: 600px;
            border-radius: 30px;
            text-align: center;
        }
		
        button {
            display: block;
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
			background: white;
			border-radius: 15px;
        }

        .correct {
            background-color: #4CAF50;
            color: white;
        }

        .wrong {
            background-color: #f44336;
            color: white;
        }

        #nextBtn {
            display: none;
            background: white;
            color: black;
        }
		
		a{
		color:black;
		}
		
        #timer {
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2 id="question">Pyetja</h2>
    <div id="timer">Koha: 40</div>
    <div id="answers"></div>
    <button id="nextBtn" onclick="nextQuestion()">Pyetja tjetër</button>
</div>

<script>
    const quiz = [
        {
            question: "1. Tekstet letrare i përdorim:",
            answers: ["A) për t'u informuar;", "B) për zhvillimin e imagjinatës;", "C) për t'u udhëzuar;", "D) për t'u bërë pjesë e shoqërisë."],
            correct: 1
        },
        {
            question: "2. Veçori e tekstit dramatik nuk është:",
            answers: ["A) dialogu;", "B) fjalët didaskalitë;", "C) monologu;", "D) shprehja e botës së brendshme."],
            correct: 3
        },
        {
            question: "3. Autori i romanit ''Kështjella'' është:",
            answers: ["A) Dritëro Agolli;", "B) Ismail Kadare;", "C) Migjeni;", "D) Ernest Koliqi."],
            correct: 1
        },
        {
            question: "4. Trajtoi temën e mjerimit në veprat e tij:",
            answers: ["A) Dritëro Agolli;", "B) Ernest Koliqi;", "C) Migjeni;", "D) Kasem Trebeshina."],
            correct: 2
        },
        {
            question: "5. Vepra ''Iliada'' e Homerit është:",
            answers: ["A) poemë epike;", "B) poemë didaktike;", "C) poemë idilike;", "D) këngë legjendare."],
            correct: 0
        },
        {
            question: "6. Trajtohet tema e luftës së vazhdueshme të njeriut për mbijetesë te vepra:",
            answers: ["A) ''Kthimi i Ululës'' Lë Klezio;", "B) ''Drita është si uji'' Markez;", "C) ''Kumbulla përtej muri'' E.Koliqi;", "D) ''Plaku dhe deti'' E.Heminguej."],
            correct: 3
        },
		{
            question: "7. Baladat janë kallëzime poetike epiko-lirike, sepse:",
            answers: ["A) gjejmë rrëfim të ngjarjes;", "B) shprehet bota shpirtërore e personazhit;", "C) gjejmë rrëfim të ngjarjes, por edhe shprehet bota shpritërore e personazhit;", "D) ka elemente fantastike."],
            correct: 2
        },
		{
            question: "8. Në vargjet ''Lulet të bardha / lule të bukura'' figura letrare është:",
            answers: ["A) metafora;", "B) anafora;", "C) krahasimi;", "D) ironia."],
            correct: 1
        }
    ];

    let currentQuestion = 0;
    let score = 0;
    let timeLeft = 40;
    let timer;

    function loadQuestion() {
        clearInterval(timer);
        timeLeft = 40;
        document.getElementById("timer").innerText = "Koha: " + timeLeft;

        timer = setInterval(() => {
            timeLeft--;
            document.getElementById("timer").innerText = "Koha: " + timeLeft;
            if (timeLeft === 0) {
                clearInterval(timer);
                disableButtons();
                document.getElementById("nextBtn").style.display = "block";
            }
        }, 1000);

        const q = quiz[currentQuestion];
        document.getElementById("question").innerText = q.question;

        const answersDiv = document.getElementById("answers");
        answersDiv.innerHTML = "";

        q.answers.forEach((answer, index) => {
            const btn = document.createElement("button");
            btn.innerText = answer;
            btn.onclick = () => checkAnswer(index, btn);
            answersDiv.appendChild(btn);
        });

        document.getElementById("nextBtn").style.display = "none";
    }

    function checkAnswer(index, button) {
        clearInterval(timer);
        const correctIndex = quiz[currentQuestion].correct;

        if (index === correctIndex) {
            button.classList.add("correct");
            score++;
        } else {
            button.classList.add("wrong");
        }

        disableButtons();
        document.getElementById("nextBtn").style.display = "block";
    }

    function disableButtons() {
        const buttons = document.querySelectorAll("#answers button");
        buttons.forEach(btn => btn.disabled = true);
    }

    function nextQuestion() {
        currentQuestion++;
        if (currentQuestion < quiz.length) {
            loadQuestion();
        } else {
            document.querySelector(".quiz-container").innerHTML = `
                <h2>Quiz përfundoi 🎉</h2>
                <p>Ke marrë <strong>${score}</strong> pikë nga <strong>${quiz.length}</strong></p>

            <button><a href ="../Konkursi Website.html"> Kthehu në faqen kryesore </a>
            `;
        }
    }

    loadQuestion();

</script>

</body>

</html>
