<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gjëegjëza</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f9f9fb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 90%;
            max-width: 550px;
            padding: 40px;
            text-align: center;
            box-sizing: border-box;
            border: 1px solid #eaeaea;
            position: relative;
            z-index: 10;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .stat-box {
            text-align: center;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #6c757d;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #d97757;
        }

        .instruction {
            font-size: 1rem;
            color: #495057;
            margin-bottom: 15px;
        }

        .riddle-box {
            font-size: 1.4rem;
            font-weight: bold;
            color: #d97757;
            line-height: 1.5;
            margin-bottom: 25px;
            padding: 10px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: pre-line;
        }

        .special-chars {
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .char-btn {
            background-color: #ffffff;
            color: #d97757;
            border: 1px solid #d97757;
            padding: 6px 14px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .char-btn:hover {
            background-color: #fdf0ec;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            font-size: 1rem;
            border: 1px solid #d97757;
            border-radius: 10px;
            background: #ffffff;
            color: #2c3e50;
            text-align: center;
            outline: none;
            box-sizing: border-box;
            transition: box-shadow 0.2s;
        }

        input[type="text"]:focus {
            box-shadow: 0 0 0 3px rgba(217, 119, 87, 0.15);
        }

        .action-btn {
            background-color: #d97757;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .action-btn:hover {
            background-color: #c46545;
        }

        .action-btn:active {
            transform: scale(0.99);
        }

        .feedback {
            margin-top: 15px;
            font-weight: bold;
            min-height: 24px;
            font-size: 0.95rem;
        }

        .correct {
            color: #27ae60;
        }

        .incorrect {
            color: #c0392b;
        }

        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
        }
    </style>
    <script type="module">
        import { inject } from 'https://cdn.jsdelivr.net/npm/@vercel/analytics@2/dist/index.mjs';
        inject();
    </script>
</head>
<body>

    <canvas id="fireworks-canvas"></canvas>

    <div class="game-container">
        <div class="header-info">
            <div class="stat-box">
                <div class="stat-label"><b>Pikë</b></div>
                <div class="stat-value" id="score-display">0/10</div>
            </div>
            <div class="stat-box">
                <div class="stat-label"><b>Koha e mbetur</b></div>
                <div class="stat-value" id="timer">30s</div>
            </div>
        </div>
        
        <div id="game-play-section">
            <div class="instruction">A e gjeni dot?</div>
            
            <div class="riddle-box" id="riddle-text">
                Duke ngarkuar...
            </div>

            <div class="special-chars" id="special-chars">
                <button class="char-btn" onclick="insertChar('ë')">ë</button>
                <button class="char-btn" onclick="insertChar('ç')">ç</button>
            </div>

            <div class="input-group" id="input-section">
                <input type="text" id="user-answer" placeholder="Shkruani përgjigjen..." autocomplete="off">
                <br><br>
                <button class="action-btn" id="action-btn" onclick="handleAction()">Kontrollo</button>
            </div>

            <div class="feedback" id="feedback"></div>
        </div>

        <div id="result-container" style="display: none; margin-top: 10px;">
            <h2 style="color: #2c3e50;">Loja përfundoi!</h2>
            <p id="final-score" style="font-size: 1.3rem; color: #495057; font-weight: bold; margin-bottom: 25px;"></p>
            <button class="action-btn" onclick="restartGame()" style="margin-bottom: 12px;">Luani përsëri</button>
            <button class="action-btn" onclick="window.location.href='../index.html'" style="background-color: #27ae60;">Kthehuni në faqen kryesore</button>
        </div>
    </div>

    <script>
        const riddles = [
            { text: "Jam lot që rrjedh nga qielli,\nmë than vetëm dielli.", answer: "shiu" },
            { text: "Të lodh shumë me të vërtetë,\npor gëzim të jep në jetë.", answer: "puna" },
            { text: "Nëse e kam nuk e ndaj,\nnëse e ndaj nuk e kam.", answer: "sekreti" },
            { text: "Si sahati tik e tak,\npunon ditë e natë,\npor po ndali sadopak,\nnuk kurdiset prapë.", answer: "zemra" },
            { text: "Hap e mbyll, ndrit si yll.", answer: "sytë" },
            { text: "Pa zë heshtur numëron,\naskush punën s'ia mohon.", answer: "ora" },
            { text: "Kur i lidh ikin, kur i zgjidh rrinë.", answer: "këpucët" },
            { text: "Rrumbullak, strumbullak,\nka shtatë vrima rreth e qark.", answer: "koka" },
            { text: "Është një kullë e bardhë, pa dritare pa shkallë.", answer: "veza" },
            { text: "Gjatë ditës të ndjek kudo, por sapo vjen nata zhduket.", answer: "hija" }
        ];

        let currentQuestion = 0;
        let score = 0;
        let state = 'checking'; // 'checking', 'next', or 'results'
        let timeLeft = 30;
        let timerInterval = null;

        const riddleTextEl = document.getElementById('riddle-text');
        const userAnswerEl = document.getElementById('user-answer');
        const actionBtnEl = document.getElementById('action-btn');
        const feedbackEl = document.getElementById('feedback');
        const scoreDisplayEl = document.getElementById('score-display');
        const timerEl = document.getElementById('timer');
        const gamePlaySection = document.getElementById('game-play-section');
        const resultContainer = document.getElementById('result-container');
        const finalScoreEl = document.getElementById('final-score');

        function insertChar(char) {
            const start = userAnswerEl.selectionStart;
            const end = userAnswerEl.selectionEnd;
            const val = userAnswerEl.value;
            userAnswerEl.value = val.substring(0, start) + char + val.substring(end);
            userAnswerEl.focus();
            userAnswerEl.setSelectionRange(start + 1, start + 1);
        }

        function startTimer() {
            timeLeft = 30;
            timerEl.innerText = `${timeLeft}s`;
            clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = `${timeLeft}s`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleTimeout();
                }
            }, 1000);
        }

        function handleTimeout() {
            if (state === 'checking') {
                feedbackEl.innerText = `Koha mbaroi! Përgjigja e saktë është: ${riddles[currentQuestion].answer}`;
                feedbackEl.className = "feedback incorrect";
                userAnswerEl.disabled = true;
                currentQuestion++;

                if (currentQuestion < riddles.length) {
                    actionBtnEl.innerText = 'Vazhdoni';
                    state = 'next';
                } else {
                    actionBtnEl.innerText = 'Shiko Rezultatin';
                    state = 'results';
                }
            }
        }

        function loadRiddle() {
            if (currentQuestion < riddles.length) {
                scoreDisplayEl.innerText = `${score}/${riddles.length}`;
                riddleTextEl.innerText = riddles[currentQuestion].text;
                userAnswerEl.value = '';
                feedbackEl.innerText = '';
                userAnswerEl.disabled = false;
                actionBtnEl.innerText = 'Kontrollo';
                state = 'checking';
                userAnswerEl.focus();
                startTimer();
            } else {
                showResults();
            }
        }

        function handleAction() {
            if (state === 'checking') {
                const userVal = userAnswerEl.value.trim().toLowerCase();
                const correctVal = riddles[currentQuestion].answer.toLowerCase();

                if (userVal === "") {
                    feedbackEl.innerText = "Ju lutem shkruani një përgjigje!";
                    feedbackEl.className = "feedback incorrect";
                    return;
                }

                clearInterval(timerInterval);

                if (userVal === correctVal) {
                    feedbackEl.innerText = "Saktë! 🌟";
                    feedbackEl.className = "feedback correct";
                    score++;
                } else {
                    feedbackEl.innerText = `Gabim! Përgjigja e saktë është: ${riddles[currentQuestion].answer}`;
                    feedbackEl.className = "feedback incorrect";
                }

                scoreDisplayEl.innerText = `${score}/${riddles.length}`;
                userAnswerEl.disabled = true;
                currentQuestion++;

                if (currentQuestion < riddles.length) {
                    actionBtnEl.innerText = 'Vazhdoni';
                    state = 'next';
                } else {
                    actionBtnEl.innerText = 'Shiko Rezultatin';
                    state = 'results';
                }
            } else if (state === 'next') {
                loadRiddle();
            } else if (state === 'results') {
                showResults();
            }
        }

        function showResults() {
            clearInterval(timerInterval);
            scoreDisplayEl.innerText = `${score}/${riddles.length}`;
            timerEl.innerText = '0s';
            
            gamePlaySection.style.display = 'none';
            resultContainer.style.display = 'block';
            finalScoreEl.innerText = `Keni fituar ${score} nga ${riddles.length} pikë.`;

            if (score === riddles.length) {
                triggerFireworks();
            }
        }

        function restartGame() {
            currentQuestion = 0;
            score = 0;
            state = 'checking';
            
            resultContainer.style.display = 'none';
            gamePlaySection.style.display = 'block';
            
            loadRiddle();
        }

        userAnswerEl.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                handleAction();
            }
        });

        /* Embedded Physics Fireworks Engine */
        function triggerFireworks() {
            const canvas = document.getElementById('fireworks-canvas');
            const ctx = canvas.getContext('2d');
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            let rockets = [];
            let particles = [];
            
            const colors = [
                '#ff4757', '#ff6b81', '#ffa502', '#eccc68', 
                '#2ed573', '#7bed9f', '#1e90ff', '#70a1ff', 
                '#5352ed', '#3742fa', '#ff78ae', '#e84393'
            ];

            class Rocket {
                constructor() {
                    this.x = Math.random() * (canvas.width * 0.8) + canvas.width * 0.1;
                    this.y = canvas.height;
                    this.targetY = Math.random() * (canvas.height * 0.35) + canvas.height * 0.1;
                    this.speed = Math.random() * 3 + 10;
                    this.angle = Math.atan2(this.targetY - this.y, (Math.random() - 0.5) * 80);
                    this.vx = Math.cos(this.angle) * this.speed;
                    this.vy = -Math.sin(Math.abs(this.angle)) * this.speed;
                    this.trail = [];
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                }

                update() {
                    this.trail.push({ x: this.x, y: this.y });
                    if (this.trail.length > 8) this.trail.shift();
                    
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += 0.08; 

                    return this.y <= this.targetY || this.vy >= -1;
                }

                draw() {
                    if (this.trail.length > 1) {
                        ctx.beginPath();
                        ctx.moveTo(this.trail[0].x, this.trail[0].y);
                        for (let i = 1; i < this.trail.length; i++) {
                            ctx.lineTo(this.trail[i].x, this.trail[i].y);
                        }
                        ctx.strokeStyle = this.color;
                        ctx.lineWidth = 2.5;
                        ctx.stroke();
                    }
                }
            }

            class Particle {
                constructor(x, y, color) {
                    this.x = x;
                    this.y = y;
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 7 + 1.5;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.alpha = 1;
                    this.decay = Math.random() * 0.012 + 0.008;
                    this.color = color;
                    this.trail = [];
                    this.friction = 0.96;
                    this.gravity = 0.1;
                }

                update() {
                    this.trail.push({ x: this.x, y: this.y });
                    if (this.trail.length > 6) this.trail.shift();

                    this.vx *= this.friction;
                    this.vy *= this.friction;
                    this.vy += this.gravity;

                    this.x += this.vx;
                    this.y += this.vy;
                    this.alpha -= this.decay;
                    
                    return this.alpha > 0;
                }

                draw() {
                    ctx.save();
                    ctx.globalAlpha = Math.max(0, this.alpha);
                    
                    if (this.trail.length > 1) {
                        ctx.beginPath();
                        ctx.moveTo(this.trail[0].x, this.trail[0].y);
                        for (let i = 1; i < this.trail.length; i++) {
                            ctx.lineTo(this.trail[i].x, this.trail[i].y);
                        }
                        ctx.strokeStyle = this.color;
                        ctx.lineWidth = 1.8;
                        ctx.stroke();
                    }

                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    ctx.restore();
                }
            }

            function createExplosion(x, y, color) {
                const count = Math.floor(Math.random() * 40) + 60;
                for (let i = 0; i < count; i++) {
                    particles.push(new Particle(x, y, color));
                }
            }

            function launchRocket() {
                rockets.push(new Rocket());
                setTimeout(launchRocket, Math.random() * 400 + 200);
            }

            launchRocket();

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                for (let i = rockets.length - 1; i >= 0; i--) {
                    const rocket = rockets[i];
                    rocket.draw();
                    if (rocket.update()) {
                        createExplosion(rocket.x, rocket.y, rocket.color);
                        rockets.splice(i, 1);
                    }
                }

                for (let i = particles.length - 1; i >= 0; i--) {
                    const particle = particles[i];
                    particle.draw();
                    if (!particle.update()) {
                        particles.splice(i, 1);
                    }
                }

                requestAnimationFrame(animate);
            }

            animate();
        }

        // Initialize the first question
        loadRiddle();
    </script>
</body>
</html>
