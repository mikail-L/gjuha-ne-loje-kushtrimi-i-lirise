<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Përcaktoni fushën leksikore</title>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: #fafafa; 
            margin: 0; 
            overflow: hidden;
        }
        .game-card { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 500px; 
            text-align: center; 
            z-index: 10; 
            position: relative; 
        }
        .stats { display: flex; justify-content: space-between; margin-bottom: 30px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.5em; font-weight: bold; color: #d67d60; }
        #word-display { font-size: 2.2em; color: #d67d60; margin: 40px 0; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #d67d60; border-radius: 8px; box-sizing: border-box; font-size: 1em; text-align: center; outline: none; }
        input:focus { box-shadow: 0 0 0 3px rgba(214, 125, 96, 0.15); }
        button.action-btn { width: 100%; padding: 15px; background-color: #d67d60; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1em; font-weight: bold; transition: background 0.2s; }
        button.action-btn:hover { background-color: #c06c50; }
        
        .feedback { margin-top: 15px; font-weight: bold; min-height: 24px; font-size: 1em; }
        .correct { color: #27ae60; }
        .incorrect { color: #c0392b; }

        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
        }
    </style>
    <script type="module">
        import { inject } from 'https://cdn.jsdelivr.net/npm/@vercel/analytics@2/dist/index.mjs';
        inject();
    </script>
</head>
<body>

<canvas id="fireworks-canvas"></canvas>

<div class="game-card">
    <div class="stats">
        <div class="stat-item">Pikë<br><span id="score" class="stat-value">0/10</span></div>
        <div class="stat-item">Koha<br><span id="timer-display" class="stat-value">30s</span></div>
    </div>

    <p>Përcaktoni fushën leksikore të fjalëve:</p>
    <h2 id="word-display">...</h2>
    
    <div id="char-buttons" style="margin-bottom: 10px;">
        <button onclick="insertChar('ë')" style="width: 45px; margin-right: 5px; padding: 5px; background-color: #f0f0f0; color: #333; border: 1px solid #d67d60; border-radius: 8px; cursor: pointer; font-weight: bold;">ë</button>
        <button onclick="insertChar('ç')" style="width: 45px; padding: 5px; background-color: #f0f0f0; color: #333; border: 1px solid #d67d60; border-radius: 8px; cursor: pointer; font-weight: bold;">ç</button>
    </div>
    
    <input type="text" id="user-input" placeholder="Shkruani fushën leksikore..." autocomplete="off">
    <button id="action-btn" class="action-btn" onclick="checkAnswer()">Kontrollo</button>
    
    <div id="feedback" class="feedback"></div>
    
    <div id="result-container" style="display: none; margin-top: 20px;">
        <h2>Loja përfundoi!</h2>
        <p id="final-score" style="font-size: 1.5em; font-weight: bold;"></p>
        <button class="action-btn" onclick="location.reload()" style="margin-bottom: 10px;">Luani përsëri</button>
        <button class="action-btn" onclick="location.href='../index.html'" style="background-color: #999;">Kthehuni në faqen kryesore</button>
    </div>
</div>

<script>
    const wordList = [
        { word: "ilaç, gjilpërë, mjek", answer: "spital" },
        { word: "laps, gomë, vizore", answer: "mjete shkollore" },
        { word: "portokall, mandarinë, limon", answer: "agrume" },
        { word: "i kuq, blu, i verdhë", answer: "ngjyrë" },
        { word: "tigër, luan, ujk", answer: "kafshë" },
        { word: "flutur, mizë, karkalec", answer: "insekte" },
        { word: "piano, klarinetë, kitarë", answer: "vegla muzikore" },
        { word: "bluzë, fustan, këmishë", answer: "veshje" },
        { word: "kompjuter, celular, postë elektronike", answer: "teknologji" },
        { word: "shkollë, nxënës, mësim", answer: "institucion" }
    ];

    let currentPair = {}, score = 0, total = 0, usedWords = [], wordTimer;
    let state = 'checking'; 
    const TIME_LIMIT = 30;

    function startTimer() {
        let timeLeft = TIME_LIMIT;
        document.getElementById("timer-display").innerText = timeLeft + "s";
        clearInterval(wordTimer);
        wordTimer = setInterval(() => {
            timeLeft--;
            document.getElementById("timer-display").innerText = timeLeft + "s";
            if (timeLeft <= 0) {
                clearInterval(wordTimer);
                handleTimeout();
            }
        }, 1000);
    }

    function handleTimeout() {
        if (state === 'checking') {
            const feedbackEl = document.getElementById("feedback");
            feedbackEl.innerText = `Koha mbaroi! Përgjigja e saktë është: ${currentPair.answer}`;
            feedbackEl.className = "feedback incorrect";
            document.getElementById("user-input").disabled = true;
            
            total++;
            document.getElementById("score").innerText = score + "/10";
            
            const btn = document.getElementById("action-btn");
            if (total < wordList.length) {
                btn.innerText = 'Vazhdoni';
                state = 'next';
            } else {
                btn.innerText = 'Shiko Rezultatin';
                state = 'results';
            }
        }
    }

    function loadNewWord() {
        if (total >= wordList.length) {
            showResults();
            return;
        }

        let index;
        do {
            index = Math.floor(Math.random() * wordList.length);
        } while (usedWords.includes(index));

        usedWords.push(index);
        currentPair = wordList[index];
        document.getElementById("word-display").innerText = currentPair.word;
        
        const input = document.getElementById("user-input");
        input.value = "";
        input.disabled = false;
        input.focus();
        
        document.getElementById("feedback").innerText = "";
        document.getElementById("action-btn").innerText = "Kontrollo";
        
        state = 'checking';
        startTimer(); 
    }

    function checkAnswer() {
        if (state === 'checking') {
            clearInterval(wordTimer);
            let inputEl = document.getElementById("user-input");
            let input = inputEl.value.trim().toLowerCase();
            let feedbackEl = document.getElementById("feedback");

            if (input === "") {
                feedbackEl.innerText = "Ju lutem shkruani një përgjigje!";
                feedbackEl.className = "feedback incorrect";
                startTimer();
                return;
            }

            if (input === currentPair.answer.toLowerCase()) {
                score++;
                feedbackEl.innerText = "Saktë! 🌟";
                feedbackEl.className = "feedback correct";
            } else {
                feedbackEl.innerText = `Gabim! Përgjigja e saktë është: ${currentPair.answer}`;
                feedbackEl.className = "feedback incorrect";
            }

            total++;
            document.getElementById("score").innerText = score + "/10";
            inputEl.disabled = true;

            const btn = document.getElementById("action-btn");
            if (total < wordList.length) {
                btn.innerText = 'Vazhdoni';
                state = 'next';
            } else {
                btn.innerText = 'Shiko Rezultatin';
                state = 'results';
            }

        } else if (state === 'next') {
            loadNewWord();
        } else if (state === 'results') {
            showResults();
        }
    }

    function showResults() {
        clearInterval(wordTimer);
        document.getElementById("word-display").style.display = "none";
        document.getElementById("user-input").style.display = "none";
        document.getElementById("char-buttons").style.display = "none";
        document.getElementById("action-btn").style.display = "none";
        document.getElementById("feedback").style.display = "none";
        document.getElementById("timer-display").innerText = "0s";

        const resCont = document.getElementById("result-container");
        resCont.style.display = "block";
        document.getElementById("final-score").innerText = `Rezultati përfundimtar: ${score}/10`;

        if (score === wordList.length) {
            triggerFireworks();
        }
    }

    function insertChar(char) {
        const input = document.getElementById("user-input");
        const start = input.selectionStart;
        const end = input.selectionEnd;
        const val = input.value;
        input.value = val.substring(0, start) + char + val.substring(end);
        input.focus();
        input.setSelectionRange(start + 1, start + 1);
    }

    document.getElementById("user-input").addEventListener("keypress", function(event) {
        if (event.key === "Enter") checkAnswer();
    });

    /* Embedded Physics Fireworks Engine */
    function triggerFireworks() {
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        let rockets = [];
        let particles = [];
        
        const colors = [
            '#ff4757', '#ff6b81', '#ffa502', '#eccc68', 
            '#2ed573', '#7bed9f', '#1e90ff', '#70a1ff', 
            '#5352ed', '#3742fa', '#ff78ae', '#e84393'
        ];

        class Rocket {
            constructor() {
                this.x = Math.random() * (canvas.width * 0.8) + canvas.width * 0.1;
                this.y = canvas.height;
                this.targetY = Math.random() * (canvas.height * 0.35) + canvas.height * 0.1;
                this.speed = Math.random() * 3 + 10;
                this.angle = Math.atan2(this.targetY - this.y, (Math.random() - 0.5) * 80);
                this.vx = Math.cos(this.angle) * this.speed;
                this.vy = -Math.sin(Math.abs(this.angle)) * this.speed;
                this.trail = [];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 8) this.trail.shift();
                
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.08; 

                return this.y <= this.targetY || this.vy >= -1;
            }

            draw() {
                if (this.trail.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length; i++) {
                        ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 2.5;
                    ctx.stroke();
                }
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 7 + 1.5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.decay = Math.random() * 0.012 + 0.008;
                this.color = color;
                this.trail = [];
                this.friction = 0.96;
                this.gravity = 0.1;
            }

            update() {
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 6) this.trail.shift();

                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;

                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
                
                return this.alpha > 0;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.alpha);
                
                if (this.trail.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length; i++) {
                        ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 1.8;
                    ctx.stroke();
                }

                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                ctx.restore();
            }
        }

        function createExplosion(x, y, color) {
            const count = Math.floor(Math.random() * 40) + 60;
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function launchRocket() {
            rockets.push(new Rocket());
            setTimeout(launchRocket, Math.random() * 400 + 200);
        }

        launchRocket();

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = rockets.length - 1; i >= 0; i--) {
                const rocket = rockets[i];
                rocket.draw();
                if (rocket.update()) {
                    createExplosion(rocket.x, rocket.y, rocket.color);
                    rockets.splice(i, 1);
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const particle = particles[i];
                particle.draw();
                if (!particle.update()) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        animate();
    }

    loadNewWord();
</script>
</body>
</html>
