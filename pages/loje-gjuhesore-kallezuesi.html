<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Dalloni llojin e kallëzuesit</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #fafafa; }
        .game-container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 600px; text-align: center; }
        
        .stats { display: flex; justify-content: space-between; margin-bottom: 30px; font-weight: bold; color: #888; }
        #word-display { font-size: 1.6rem; color: #d36a4a; margin: 20px 0; min-height: 60px; display: flex; align-items: center; justify-content: center;}
        
        .button-grid { display: grid; grid-template-columns: repeat(1, 1fr); gap: 10px; margin-top: 30px; }
        .game-btn { padding: 15px 10px; background: #f5f2ed; border: 1px solid #e0dcd5; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        .game-btn:hover { background: #e8e4dc; }
        
        #game-over { display: none; }
        .nav-btn { margin-top: 15px; padding: 12px 20px; cursor: pointer; display: block; width: 100%; border: none; border-radius: 10px; background: #eee; font-size: 1rem; font-weight: bold; }
        .restart-btn { background: #d36a4a; color: white; }
    </style>
    <script type="module">
        import { inject } from 'https://cdn.jsdelivr.net/npm/@vercel/analytics@2/dist/index.mjs';
        inject();
    </script>
</head>
<body>

<div class="game-container" id="game-ui">
    <div class="stats">
        <div>Pikë: <span id="score">0</span>/10</div>
        <div>Koha e mbetur: <span id="timer">30s</span></div>
    </div>

    <p>Dalloni llojin e kallëzuesit në fjalinë e mëposhtme.</p>
    <h1 id="word-display">Nxënësit po lexonin.</h1>

    <div class="button-grid" id="button-grid">
        <button class="game-btn" onclick="processAnswer('Kallëzues foljor i thjeshtë')">Kallëzues foljor i thjeshtë</button>
        <button class="game-btn" onclick="processAnswer('Kallëzues foljor i përbërë')">Kallëzues foljor i përbërë</button>
        <button class="game-btn" onclick="processAnswer('Kallëzues emëror')">Kallëzues emëror</button>
    </div>
</div>

<div class="game-container" id="game-over">
    <h1>Loja përfundoi!</h1>
    <p style="font-size: 1.2rem;">Pikët tuaja përfundimtare: <span id="final-score">0</span>/10</p>
    
    <button class="nav-btn restart-btn" onclick="location.reload()">Luani përsëri</button>
    <button class="nav-btn" onclick="window.location.href='../index.html'">Kthehuni në faqen kryesore</button>
</div>

<script>
    const gameData = [
        {word: "Nxënësit po lexonin.", type: "Kallëzues foljor i thjeshtë"},
        {word: "Ato mbaruan së lexuari tregimin.", type: "Kallëzues foljor i përbërë"},
        {word: "Unë jam nxënëse.", type: "Kallëzues emëror"},
        {word: "Detyra duhet punuar me kujdes.", type: "Kallëzues foljor i përbërë"},
        {word: "Ai kishte mësuar shumë.", type: "Kallëzues foljor i thjeshtë"},
        {word: "Ai vazhdonte të fliste pa pushim.", type: "Kallëzues foljor i përbërë"},
        {word: "Alba vazhdoi punën.", type: "Kallëzues foljor i thjeshtë"},
        {word: "Ai e recitoi bukur poezinë.", type: "Kallëzues foljor i thjeshtë"},
        {word: "Ky projekt do punuar me kujdes.", type: "Kallëzues foljor i përbërë"},
        {word: "Kjo nxënëse qenka e talentuar!", type: "Kallëzues emëror"}
    ];

    let currentIndex = 0;
    let score = 0;
    let timeLeft = 30;
    let timerInterval;

    function startTimer() {
        timeLeft = 30;
        document.getElementById('timer').innerText = timeLeft + "s";
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft + "s";
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                processAnswer(null);
            }
        }, 1000);
    }

    function processAnswer(selected) {
        clearInterval(timerInterval);
        if (selected === gameData[currentIndex].type) {
            score++;
            document.getElementById('score').innerText = score;
        }
        
        currentIndex++;
        if (currentIndex < gameData.length) {
            document.getElementById('word-display').innerText = gameData[currentIndex].word;
            startTimer();
        } else {
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('final-score').innerText = score;
        }
    }

    startTimer();
</script>

</body>
</html>
