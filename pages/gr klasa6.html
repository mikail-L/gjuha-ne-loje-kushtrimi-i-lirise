<html>
<head>
    <meta charset="UTF-8">
    <title>Lojë Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
			background: white;
        }
		
        .quiz-container {
            background: #21CBF3;
            padding: 20px;
            width: 600px;
            border-radius: 30px;
            text-align: center;
        }
		
        button {
            display: block;
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
			background: white;
			border-radius: 15px;
        }

        .correct {
            background-color: #4CAF50;
            color: white;
        }

        .wrong {
            background-color: #f44336;
            color: white;
        }

        #nextBtn {
            display: none;
            background: white;
            color: black;
        }
		
		a{
		color:black;
		}
		
        #timer {
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2 id="question">Pyetja</h2>
    <div id="timer">Koha: 40</div>
    <div id="answers"></div>
    <button id="nextBtn" onclick="nextQuestion()">Pyetja tjetër</button>
</div>

<script>
    const quiz = [
        {
            question: "1. Te fjala ''rrufehedhësit'', -it është:",
            answers: ["A) mbaresë;", "B) prapashtesë;", "C) parashtesë;", "D) temë."],
            correct: 0
        },
		{
            question: "2. Cila fjalë është futur gabim sipas klasës ku bën pjesë?",
            answers: ["A) bukur;", "B) i trëndafiltë;", "C) ftohtë;", "D) lehtë."],
            correct: 1
        },
		{
            question: "3. Dalloni grupin e emrave:",
            answers: ["A) vrapon, mëson, dëgjon;", "B) bukur, mirë, qartë;", "C) të ecurit, të ngrohtët, të folurit;", "D) i shpejtë, e mirë, e qetë."],
            correct: 2
        },
		{
			-
            question: "4. Në cilën alternativë ka folje në kohën e tashme, mënyra dëftore?",
            answers: ["A) shkroi;", "B) shkruan;", "C) do të shruaj;", "D) kishte shkruar."],
            correct: 1
        },
        {
            question: "5. Në cilën prej alternativave kemi vetëm lidhëza bashkërenditëse?",
            answers: ["A) ndaj, andaj, apo, por, edhe;", "B) se, që, në, nëse, nga;", "C) porsi, sa, si, sesa, sepse;", "D) që, ku, kur, me qëllim që."],
            correct: 0
        },
		{
            question: "6. Dalloni fjalinë dëftore.",
            answers: ["A) A po vjen?", "B) Sa bukur!", "C) Nxënësit janë në klasë.", "D) Qetësi!"],
            correct: 2
        },
        {
            question: "7. Gjymtyrët kryesore të fjalisë janë:",
            answers: ["A) kallëzuesi dhe kundrinori;", "B) kryefjala dhe kallëzuesi;", "C) ndajshtimi dhe rrethanori;", "D) përcaktori dhe kundrinori."],
            correct: 1
        },
		{
            question: "8. Ai veronte në një kasolle kashte pranë lumit. Fjala ''kashte'' kryen funksionin si: ",
            answers: ["A) rrethanor;", "B) pëcaktor me përshtatje;", "C) përcaktor me bashkim;", "D) përcaktor me drejtim."],
            correct: 3
        },
		{
            question: "9. Ai u nis me vrap drejt mësuesit. Fjala ''me vrap'' kryen funksionin si:",
            answers: ["A) rrethanor;", "B) kundrinor;", "C) ndajshtim;", "D) përcaktor me drejtim."],
            correct: 0
        },
		{
            question: "10. Në fjalitë e dhëna dalloni fjalinë e thjeshtë.",
            answers: ["A) Kodrinat ishin të pjerrëta dhe majat e mbuluar me borë dukeshin më larg.", "B) Luani i plagosur nuk dinte se ç'ishte frika e vdekjes.", "C) Me mijëra anije janë mbytur në këtë ngushtice të zymtë.", "D) Magelani ishte i pari që kaloi përmes asaj ngushticë."],
            correct: 2
        }
    ];

    let currentQuestion = 0;
    let score = 0;
    let timeLeft = 40;
    let timer;

    function loadQuestion() {
        clearInterval(timer);
        timeLeft = 40;
        document.getElementById("timer").innerText = "Koha: " + timeLeft;

        timer = setInterval(() => {
            timeLeft--;
            document.getElementById("timer").innerText = "Koha: " + timeLeft;
            if (timeLeft === 0) {
                clearInterval(timer);
                disableButtons();
                document.getElementById("nextBtn").style.display = "block";
            }
        }, 1000);

        const q = quiz[currentQuestion];
        document.getElementById("question").innerText = q.question;

        const answersDiv = document.getElementById("answers");
        answersDiv.innerHTML = "";

        q.answers.forEach((answer, index) => {
            const btn = document.createElement("button");
            btn.innerText = answer;
            btn.onclick = () => checkAnswer(index, btn);
            answersDiv.appendChild(btn);
        });

        document.getElementById("nextBtn").style.display = "none";
    }

    function checkAnswer(index, button) {
        clearInterval(timer);
        const correctIndex = quiz[currentQuestion].correct;

        if (index === correctIndex) {
            button.classList.add("correct");
            score++;
        } else {
            button.classList.add("wrong");
        }

        disableButtons();
        document.getElementById("nextBtn").style.display = "block";
    }

    function disableButtons() {
        const buttons = document.querySelectorAll("#answers button");
        buttons.forEach(btn => btn.disabled = true);
    }

    function nextQuestion() {
        currentQuestion++;
        if (currentQuestion < quiz.length) {
            loadQuestion();
        } else {
            document.querySelector(".quiz-container").innerHTML = `
                <h2>Quiz përfundoi 🎉</h2>
                <p>Ke marrë <strong>${score}</strong> pikë nga <strong>${quiz.length}</strong></p>

            <button><a href ="../Konkursi Website.html"> Kthehu në faqen kryesore </a>
            `;
        }
    }

    loadQuestion();

</script>

</body>

</html>
