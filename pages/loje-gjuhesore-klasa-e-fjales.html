<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Gjeni klasën e fjalës</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #fafafa; margin: 0; }
        .game-container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 500px; text-align: center; position: relative; z-index: 2; }
        
        .stats { display: flex; justify-content: space-between; margin-bottom: 30px; font-weight: bold; color: #888; }
        #word-display { font-size: 3rem; color: #d36a4a; margin: 20px 0; }
        
        .button-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 30px; }
        .game-btn { padding: 15px 5px; background: #f5f2ed; border: 1px solid #e0dcd5; border-radius: 10px; cursor: pointer; font-weight: bold; transition: background-color 0.2s, color 0.2s; }
        .game-btn:hover { background: #e8e4dc; }
        
        .correct { background-color: #4caf50 !important; color: white !important; border-color: #4caf50 !important; }
        .incorrect { background-color: #f44336 !important; color: white !important; border-color: #f44336 !important; }
        
        #game-over { display: none; }
        .nav-btn { margin-top: 10px; padding: 10px 20px; cursor: pointer; display: block; width: 100%; border: none; border-radius: 10px; background: #eee; }
        .restart-btn { background: #d36a4a; color: white; }

        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
        }
    </style>
    <script type="module">
        import { inject } from 'https://cdn.jsdelivr.net/npm/@vercel/analytics@2/dist/index.mjs';
        inject();
    </script>
</head>
<body>

<canvas id="fireworks-canvas"></canvas>

<div class="game-container" id="game-ui">
    
    <div class="stats">
        <div>Pikë: <span id="score">0</span>/10</div>
        <div>Koha e mbetur: <span id="timer">20s</span></div>
    </div>

    <p>Gjeni klasën e fjalës:</p>
    <h1 id="word-display">dëshirë</h1>

    <div class="button-grid" id="button-grid">
        <button class="game-btn" onclick="processAnswer('emër', this)">emër</button>
        <button class="game-btn" onclick="processAnswer('përemër', this)">përemër</button>
        <button class="game-btn" onclick="processAnswer('mbiemër', this)">mbiemër</button>
        <button class="game-btn" onclick="processAnswer('ndajfolje', this)">ndajfolje</button>
        <button class="game-btn" onclick="processAnswer('lidhëz', this)">lidhëz</button>
        <button class="game-btn" onclick="processAnswer('pjesëz', this)">pjesëz</button>
        <button class="game-btn" onclick="processAnswer('pasthirrmë', this)">pasthirrmë</button>
        <button class="game-btn" onclick="processAnswer('folje', this)">folje</button>
        <button class="game-btn" onclick="processAnswer('numëror', this)">numëror</button>
    </div>
</div>

<div class="game-container" id="game-over">
    <h1>Loja përfundoi!</h1>
    <p>Pikët tuaja përfundimtare: <span id="final-score">0</span>/10</p>
    
    <button class="nav-btn restart-btn" onclick="location.reload()">Luani përsëri</button>
    <button class="nav-btn" onclick="window.location.href='../index.html'">Kthehuni në faqen kryesore</button>
</div>

<script>
    const gameData = [
        {word: "dëshirë", type: "emër"}, {word: "disa", type: "përemër"},
        {word: "i saktë", type: "mbiemër"}, {word: "saktë", type: "ndajfolje"},
        {word: "kurse", type: "lidhëz"}, {word: "jo", type: "pjesëz"},
        {word: "mirëdita", type: "pasthirrmë"}, {word: "mësoj", type: "folje"},
        {word: "dy", type: "numëror"}, {word: "nesër", type: "ndajfolje"}
    ];

    let currentIndex = 0;
    let score = 0;
    let timeLeft = 30;
    let timerInterval;

    function initializeLayout() {
        const grid = document.getElementById('button-grid');
        for (let i = grid.children.length; i >= 0; i--) {
            grid.appendChild(grid.children[Math.random() * i | 0]);
        }
    }

    function startTimer() {
        timeLeft = 30;
        document.getElementById('timer').innerText = timeLeft + "s";
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft + "s";
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                processAnswer(null, null);
            }
        }, 1000);
    }

    function processAnswer(selected, btnElement) {
        clearInterval(timerInterval);
        
        const buttons = document.querySelectorAll('.game-btn');
        buttons.forEach(btn => btn.style.pointerEvents = 'none');

        const isCorrect = selected === gameData[currentIndex].type;

        if (isCorrect) {
            score++;
            document.getElementById('score').innerText = score;
        }
        
        if (btnElement) {
            if (isCorrect) {
                btnElement.classList.add('correct');
            } else {
                btnElement.classList.add('incorrect');
            }
        }

        setTimeout(() => {
            if (btnElement) {
                btnElement.classList.remove('correct', 'incorrect');
            }
            buttons.forEach(btn => btn.style.pointerEvents = 'auto');

            currentIndex++;
            if (currentIndex < gameData.length) {
                document.getElementById('word-display').innerText = gameData[currentIndex].word;
                startTimer();
            } else {
                document.getElementById('game-ui').style.display = 'none';
                document.getElementById('game-over').style.display = 'block';
                document.getElementById('final-score').innerText = score;

                if (score === gameData.length) {
                    launchFireworks();
                }
            }
        }, 800); 
    }

    // ---- Fireworks effect (canvas-based, no external libs) ----
    const fwCanvas = document.getElementById('fireworks-canvas');
    const fwCtx = fwCanvas.getContext('2d');
    let fwParticles = [];
    let fwAnimationId = null;
    let fwLaunchInterval = null;

    function resizeFwCanvas() {
        fwCanvas.width = window.innerWidth;
        fwCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeFwCanvas);
    resizeFwCanvas();

    function randomColor() {
        const colors = ['#ff595e', '#ffca3a', '#8ac926', '#1982c4', '#6a4c93', '#ff924c', '#ff5cad', '#00f5d4', '#f15bb5', '#fee440'];
        return colors[Math.floor(Math.random() * colors.length)];
    }

    // A rocket that shoots up, then explodes into a firework burst
    function createRocket() {
        const x = Math.random() * fwCanvas.width * 0.8 + fwCanvas.width * 0.1;
        const targetY = Math.random() * fwCanvas.height * 0.35 + fwCanvas.height * 0.12;
        fwParticles.push({
            type: 'rocket',
            x, y: fwCanvas.height + 10,
            targetY,
            vx: (Math.random() - 0.5) * 0.6,
            vy: -(9 + Math.random() * 3),
            color: randomColor(),
            size: 2.5,
            trail: []
        });
    }

    function explode(x, y, color) {
        const particleCount = 90 + Math.floor(Math.random() * 40);
        const isRing = Math.random() < 0.35;
        for (let i = 0; i < particleCount; i++) {
            const angle = (Math.PI * 2 * i) / particleCount + Math.random() * 0.1;
            const speed = isRing ? (4.5 + Math.random() * 0.8) : (1 + Math.random() * 5.5);
            fwParticles.push({
                type: 'spark',
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                alpha: 1,
                color,
                gravity: 0.045,
                friction: 0.975,
                size: 1.5 + Math.random() * 2,
                flicker: Math.random() < 0.3
            });
        }
        // bright flash core
        fwParticles.push({
            type: 'flash',
            x, y,
            alpha: 0.8,
            size: 4
        });
    }

    function animateFireworks() {
        // trailing fade instead of full clear, for glowing streak effect
        fwCtx.fillStyle = 'rgba(0, 0, 0, 0.18)';
        fwCtx.globalCompositeOperation = 'destination-out';
        fwCtx.fillRect(0, 0, fwCanvas.width, fwCanvas.height);
        fwCtx.globalCompositeOperation = 'source-over';

        fwParticles.forEach(p => {
            if (p.type === 'rocket') {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.12; // slight gravity slows the ascent
                p.trail.push({ x: p.x, y: p.y });
                if (p.trail.length > 6) p.trail.shift();
                if (p.y <= p.targetY || p.vy >= -1) {
                    p.dead = true;
                    explode(p.x, p.y, p.color);
                }
            } else if (p.type === 'spark') {
                p.vx *= p.friction;
                p.vy *= p.friction;
                p.vy += p.gravity;
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.011;
            } else if (p.type === 'flash') {
                p.alpha -= 0.15;
                p.size += 3;
            }
        });

        fwParticles = fwParticles.filter(p => {
            if (p.type === 'rocket') return !p.dead;
            return p.alpha > 0;
        });

        fwParticles.forEach(p => {
            fwCtx.save();
            if (p.type === 'rocket') {
                fwCtx.strokeStyle = p.color;
                fwCtx.lineWidth = p.size;
                fwCtx.lineCap = 'round';
                fwCtx.beginPath();
                p.trail.forEach((pt, i) => {
                    if (i === 0) fwCtx.moveTo(pt.x, pt.y);
                    else fwCtx.lineTo(pt.x, pt.y);
                });
                fwCtx.lineTo(p.x, p.y);
                fwCtx.stroke();
            } else if (p.type === 'spark') {
                const a = p.flicker ? Math.max(p.alpha * (0.5 + Math.random() * 0.5), 0) : Math.max(p.alpha, 0);
                fwCtx.globalAlpha = a;
                fwCtx.shadowBlur = 12;
                fwCtx.shadowColor = p.color;
                fwCtx.fillStyle = p.color;
                fwCtx.beginPath();
                fwCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                fwCtx.fill();
            } else if (p.type === 'flash') {
                fwCtx.globalAlpha = Math.max(p.alpha, 0);
                fwCtx.fillStyle = '#ffffff';
                fwCtx.shadowBlur = 20;
                fwCtx.shadowColor = '#ffffff';
                fwCtx.beginPath();
                fwCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                fwCtx.fill();
            }
            fwCtx.restore();
        });

        fwAnimationId = requestAnimationFrame(animateFireworks);
    }

    function launchFireworks() {
        if (fwAnimationId) cancelAnimationFrame(fwAnimationId);
        if (fwLaunchInterval) clearInterval(fwLaunchInterval);
        fwParticles = [];
        fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
        animateFireworks();

        // Keep launching rockets forever (until the page is reloaded / left)
        createRocket();
        createRocket();
        fwLaunchInterval = setInterval(() => {
            createRocket();
            if (Math.random() < 0.4) createRocket();
        }, 550);
    }

    // Initialize game
    initializeLayout();
    startTimer();
</script>

</body>
</html>
