<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Lojë Gjuhësore</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #fafafa; }
        .game-container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 500px; text-align: center; }
        
        .stats { display: flex; justify-content: space-between; margin-bottom: 30px; font-weight: bold; color: #888; }
        #word-display { font-size: 3rem; color: #d36a4a; margin: 20px 0; }
        
        .button-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 30px; }
        .game-btn { padding: 15px 5px; background: #f5f2ed; border: 1px solid #e0dcd5; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .game-btn:hover { background: #e8e4dc; }
        
        #game-over { display: none; }
        .nav-btn { margin-top: 10px; padding: 10px 20px; cursor: pointer; display: block; width: 100%; border: none; border-radius: 10px; background: #eee; }
        .restart-btn { background: #d36a4a; color: white; }
    </style>
</head>
<body>

<div class="game-container" id="game-ui">
    
    <div class="stats">
        <div>Pikë: <span id="score">0</span>/10</div>
        <div>Koha e mbetur: <span id="timer">20s</span></div>
    </div>

    <p>Gjeni klasën e fjalës:</p>
    <h1 id="word-display">dëshirë</h1>

    <div class="button-grid" id="button-grid">
        <button class="game-btn" onclick="processAnswer('emër')">emër</button>
        <button class="game-btn" onclick="processAnswer('përemër')">përemër</button>
        <button class="game-btn" onclick="processAnswer('mbiemër')">mbiemër</button>
        <button class="game-btn" onclick="processAnswer('ndajfolje')">ndajfolje</button>
        <button class="game-btn" onclick="processAnswer('lidhëz')">lidhëz</button>
        <button class="game-btn" onclick="processAnswer('pjesëz')">pjesëz</button>
        <button class="game-btn" onclick="processAnswer('pasthirrmë')">pasthirrmë</button>
        <button class="game-btn" onclick="processAnswer('folje')">folje</button>
        <button class="game-btn" onclick="processAnswer('numëror')">numëror</button>
    </div>
</div>

<div class="game-container" id="game-over">
    <h1>Loja përfundoi!</h1>
    <p>Pikët tuaja përfundimtare: <span id="final-score">0</span>/10</p>
    
    <button class="nav-btn restart-btn" onclick="location.reload()">Luani përsëri</button>
    <button class="nav-btn" onclick="window.location.href='/index.html'">Kthehuni në faqen kryesore</button>
</div>

<script>
    const gameData = [
        {word: "dëshirë", type: "emër"}, {word: "disa", type: "përemër"},
        {word: "i saktë", type: "mbiemër"}, {word: "saktë", type: "ndajfolje"},
        {word: "kurse", type: "lidhëz"}, {word: "jo", type: "pjesëz"},
        {word: "mirëdita", type: "pasthirrmë"}, {word: "mësoj", type: "folje"},
        {word: "dy", type: "numëror"}, {word: "nesër", type: "ndajfolje"}
    ];

    let currentIndex = 0;
    let score = 0;
    let timeLeft = 20;
    let timerInterval;

    function initializeLayout() {
        const grid = document.getElementById('button-grid');
        for (let i = grid.children.length; i >= 0; i--) {
            grid.appendChild(grid.children[Math.random() * i | 0]);
        }
    }

    function startTimer() {
        timeLeft = 20;
        document.getElementById('timer').innerText = timeLeft + "s";
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft + "s";
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                processAnswer(null);
            }
        }, 1000);
    }

    function processAnswer(selected) {
        clearInterval(timerInterval);
        if (selected === gameData[currentIndex].type) {
            score++;
            document.getElementById('score').innerText = score;
        }
        
        currentIndex++;
        if (currentIndex < gameData.length) {
            document.getElementById('word-display').innerText = gameData[currentIndex].word;
            startTimer();
        } else {
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('final-score').innerText = score;
        }
    }

    // Initialize game
    initializeLayout();
    startTimer();
</script>

</body>
</html>
